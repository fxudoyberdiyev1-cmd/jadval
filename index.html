<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON UNIVERSITY | Portal v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-cyan: #00f2ff; 
            --bg-body: radial-gradient(circle at top right, #0d1621, #080a0c);
            --text-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.02);
            --sidebar-bg: rgba(13, 18, 23, 0.8);
        }
        .light-mode {
            --bg-body: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            --text-color: #0f172a;
            --panel-bg: rgba(0, 0, 0, 0.04);
            --sidebar-bg: rgba(255, 255, 255, 0.9);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-body);
            color: var(--text-color); 
            min-height: 100vh; margin: 0; display: flex; overflow: hidden;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .light-mode input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0); }
        input::placeholder { color: rgba(255, 255, 255, 0.5) !important; }
        .light-mode input::placeholder { color: rgba(0, 0, 0, 0.4) !important; }
        aside { width: 300px; background: var(--sidebar-bg); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 2rem 1.2rem; }
        main { flex: 1; padding: 3rem; overflow-y: auto; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .nav-link.active { background: rgba(255, 255, 255, 0.05); color: var(--accent-cyan); border: 1px solid rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[1000] bg-[#080a0c] flex items-center justify-center">
        <div class="glass-panel p-10 w-96 text-center border border-white/10">
            <h2 class="text-3xl font-black italic text-white mb-8 uppercase">Sarbon OS</h2>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Логин" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500">
                <input id="login-pass" type="password" placeholder="Пароль" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500">
                <button onclick="checkAuth()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-white uppercase tracking-widest hover:bg-blue-500 transition-all">Кириш</button>
            </div>
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 font-bold hidden uppercase">Хато!</p>
        </div>
    </div>

    <aside id="main-aside" style="display: none;">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase">Sarbon</h1>
            <p class="text-[9px] font-bold tracking-[5px] text-cyan-400 uppercase">Universiteti</p>
        </div>
        <nav class="flex-1 space-y-2">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link flex items-center gap-3 p-4 rounded-xl cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="layout-dashboard"></i> Boshqaruv</div>
            <div onclick="showPage('students')" id="nav-students" class="nav-link flex items-center gap-3 p-4 rounded-xl cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="users"></i> Talabalar</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-link flex items-center gap-3 p-4 rounded-xl cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="calendar-range"></i> Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-link flex items-center gap-3 p-4 rounded-xl cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="plus-circle"></i> Qo'shish</div>
        </nav>
        <div class="mt-auto border-t border-white/5 pt-6 space-y-4">
            <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl bg-white/5 text-[10px] font-bold uppercase tracking-widest transition-all hover:bg-white/10">
                <i data-lucide="sun-moon"></i> Режим
            </button>
            <button onclick="location.reload()" class="w-full p-3 rounded-xl bg-red-500/10 text-red-400 text-[10px] font-bold uppercase transition-all">Чиқиш</button>
        </div>
    </aside>

    <main id="main-content" style="display: none;">
        <header class="flex justify-between items-center mb-12">
            <h2 id="page-title" class="text-5xl font-black italic uppercase">Boshqaruv</h2>
            <div class="bg-black/20 p-4 rounded-3xl border border-white/5 text-right">
                <p id="live-time" class="text-2xl font-black text-cyan-400">00:00</p>
                <p id="live-date" class="text-[10px] font-bold text-gray-500 uppercase">-- -- --</p>
            </div>
        </header>

        <div id="dashboard" class="space-y-6">
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
        </div>

        <div id="students" class="hidden space-y-6">
            <div id="student-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </div>

        <div id="weekly" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-7 gap-4 text-center">
                <div class="bg-blue-600 p-4 rounded-2xl text-white font-black uppercase text-xs">Dushanba</div>
            </div>
        </div>

        <div id="add" class="hidden space-y-12">
            <div class="max-w-xl mx-auto glass-panel p-10 border border-blue-500/20">
                <h3 class="text-2xl font-black mb-6 uppercase italic text-cyan-400">O'qituvchi Qo'shish</h3>
                <div class="space-y-4">
                    <input id="in-ifsh" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500" placeholder="O'qituvchi F.I.Sh">
                    <input id="in-fan" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500" placeholder="Fan nomi">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="in-sana" type="date" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none">
                        <input id="in-image" type="file" accept="image/*" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-[10px] text-gray-400">
                    </div>
                    <button onclick="saveTeacher()" class="w-full bg-blue-600 p-4 rounded-xl font-black uppercase text-white hover:bg-blue-500 transition-all">Saqlash</button>
                </div>
            </div>

            <div class="max-w-xl mx-auto glass-panel p-10 border border-green-500/20">
                <h3 class="text-2xl font-black mb-6 uppercase italic text-green-400">Talaba Qo'shish</h3>
                <div class="space-y-4">
                    <input id="st-name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-green-500" placeholder="Talaba F.I.Sh">
                    <input id="st-group" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-green-500" placeholder="Guruhi">
                    <button onclick="saveStudent()" class="w-full bg-green-600 p-4 rounded-xl font-black uppercase text-white hover:bg-green-500 transition-all">Talabani Saqlash</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ЛОГИКА ҚИСМИ (ҲЕЧ НАРСА ЎЧИРИЛМАДИ)
        function checkAuth() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if(u === "admin" && p === "sarbon2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-aside').style.display = 'flex';
                document.getElementById('main-content').style.display = 'block';
                lucide.createIcons();
                showPage('dashboard');
            } else { document.getElementById('error-msg').classList.remove('hidden'); }
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        function showPage(id) {
            document.querySelectorAll('main > div').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id === 'dashboard' ? 'Boshqaruv' : id.toUpperCase();
            if(id === 'dashboard') renderDashboard();
            if(id === 'students') renderStudents();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-date').innerText = now.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();

        let db = JSON.parse(localStorage.getItem('sarbon_v55')) || [];
        let studentsDb = JSON.parse(localStorage.getItem('sarbon_students')) || [];

        function saveTeacher() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const file = document.getElementById('in-image').files[0];
            if(!ifsh || !fan || !sana) return alert("Ma'lumotlarni to'ldiring!");

            if(file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    db.push({ id: Date.now(), ifsh, fan, sana, img: reader.result });
                    localStorage.setItem('sarbon_v55', JSON.stringify(db));
                    showPage('dashboard');
                };
                reader.readAsDataURL(file);
            } else {
                db.push({ id: Date.now(), ifsh, fan, sana, img: null });
                localStorage.setItem('sarbon_v55', JSON.stringify(db));
                showPage('dashboard');
            }
        }

        function saveStudent() {
            const name = document.getElementById('st-name').value;
            const group = document.getElementById('st-group').value;
            if(!name || !group) return alert("To'ldiring!");
            studentsDb.push({ id: Date.now(), name, group });
            localStorage.setItem('sarbon_students', JSON.stringify(studentsDb));
            alert("Talaba qo'shildi!");
            showPage('students');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-panel p-6 flex items-center gap-6 border border-white/5">
                    ${t.img ? `<img src="${t.img}" class="w-16 h-16 rounded-2xl object-cover border border-cyan-500/30">` : 
                    `<div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-400 font-bold text-2xl uppercase">${t.ifsh[0]}</div>`}
                    <div>
                        <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">${t.ifsh}</span>
                        <h4 class="text-xl font-black italic uppercase text-white">${t.fan}</h4>
                        <p class="text-[10px] font-bold text-white/50 mt-1 uppercase">📅 ${t.sana}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderStudents() {
            const grid = document.getElementById('student-grid');
            grid.innerHTML = studentsDb.slice().reverse().map(s => `
                <div class="glass-panel p-5 border border-white/5 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center text-green-400"><i data-lucide="user"></i></div>
                    <div>
                        <h4 class="font-bold text-white uppercase text-sm">${s.name}</h4>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider">${s.group}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
