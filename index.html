<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дарс Жадвали</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --bg: #f8fafc;
            --text: #334155;
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0;
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 550px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            overflow: hidden; 
            border: 1px solid #e2e8f0;
        }
        .header { 
            background: var(--dark); 
            color: white; 
            padding: 30px 20px; 
            text-align: center;
            position: relative;
        }
        .header h2 { 
            margin: 0; 
            font-size: 24px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px 2px 0 0;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th { 
            background: #f1f5f9; 
            color: #64748b; 
            text-align: left; 
            padding: 15px 20px; 
            font-size: 12px; 
            font-weight: 700;
            text-transform: uppercase;
        }
        td { 
            padding: 20px; 
            border-bottom: 1px solid #f1f5f9;
        }
        .num-badge {
            background: #eff6ff;
            color: var(--primary);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
        }
        .subject-container {
            display: flex;
            flex-direction: column;
        }
        .subject-name { 
            font-weight: 600; 
            color: var(--dark); 
            font-size: 16px; 
            line-height: 1.4;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }
        
        /* Телефон учун мослаштириш */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .header h2 { font-size: 20px; }
            td { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📅 ДАРС ЖАДВАЛИ</h2>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">№</th>
                    <th>Фан номи</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><div class="num-badge">1</div></td>
                    <td><span class="subject-name">Iqtisodiyot nazariyasi 2</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">2</div></td>
                    <td><span class="subject-name">Xorijiy til 2 (ingliz, fransuz, nemis, koreys, yapon, xitoy)</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">3</div></td>
                    <td><span class="subject-name">O‘zbek (rus) tili</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">4</div></td>
                    <td><span class="subject-name">Dinshunoslik</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">5</div></td>
                    <td><span class="subject-name">Jismoniy madaniyat va sport</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">6</div></td>
                    <td><span class="subject-name">Akademik ko‘nikmalar va kasbiy kompetentlik</span></td>
                </tr>
                <tr>
                    <td><div class="num-badge">7</div></td>
                    <td><span class="subject-name">Amaliy matematika 2</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
