<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON UNIVERSITY | Portal v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-cyan: #00f2ff; 
            --bg-body: radial-gradient(circle at top right, #0d1621, #080a0c);
            --text-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.02);
            --sidebar-bg: rgba(13, 18, 23, 0.8);
            --radius: 4px; /* Тўртбурчак дизайн */
        }
        .light-mode {
            --bg-body: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            --text-color: #0f172a;
            --panel-bg: rgba(0, 0, 0, 0.04);
            --sidebar-bg: rgba(255, 255, 255, 0.9);
        }
        .ocean-mode {
            --bg-body: linear-gradient(135deg, #1e3a8a, #1e40af);
            --text-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(30, 58, 138, 0.9);
            --accent-cyan: #fbbf24;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-body);
            color: var(--text-color); 
            min-height: 100vh; margin: 0; display: flex; overflow: hidden;
            transition: all 0.3s ease;
        }
        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: var(--radius); 
        }
        .rounded-xl, .rounded-2xl, .rounded-3xl { border-radius: var(--radius) !important; }
        
        aside { width: 300px; background: var(--sidebar-bg); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 2rem 1.2rem; border-right: 1px solid rgba(255, 255, 255, 0.05); }
        main { flex: 1; padding: 3rem; overflow-y: auto; }
        .nav-link.active { background: rgba(255, 255, 255, 0.05); color: var(--accent-cyan); border: 1px solid rgba(0, 242, 255, 0.2); }
        
        /* Жадвал устунлари */
        .day-column { min-height: 500px; background: rgba(255, 255, 255, 0.02); padding: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .lesson-card { padding: 15px; margin-bottom: 10px; font-weight: bold; border-radius: var(--radius); }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[1000] bg-[#080a0c] flex items-center justify-center">
        <div class="glass-panel p-10 w-96 text-center border border-white/10">
            <h2 class="text-3xl font-black italic text-white mb-8 uppercase">Sarbon OS</h2>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Логин" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none focus:border-cyan-500">
                <input id="login-pass" type="password" placeholder="Пароль" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none focus:border-cyan-500">
                <button onclick="checkAuth()" class="w-full bg-blue-600 p-4 font-black text-white uppercase tracking-widest hover:bg-blue-500 transition-all">Кириш</button>
            </div>
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 font-bold hidden uppercase">Хато!</p>
        </div>
    </div>

    <aside id="main-aside" style="display: none;">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase">Sarbon</h1>
            <p class="text-[9px] font-bold tracking-[5px] text-cyan-400 uppercase">Universiteti</p>
        </div>
        <nav class="flex-1 space-y-2">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="layout-dashboard"></i> Boshqaruv</div>
            <div onclick="showPage('students')" id="nav-students" class="nav-link flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="users"></i> Talabalar</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-link flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="calendar-range"></i> Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-link flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-all"><i data-lucide="plus-circle"></i> Qo'shish</div>
            <div onclick="showPage('admin')" id="nav-admin" class="nav-link flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-all text-cyan-400"><i data-lucide="shield-check"></i> Admin</div>
        </nav>
        <div class="mt-auto border-t border-white/5 pt-6 space-y-4">
            <button onclick="cycleTheme()" class="w-full flex items-center justify-center gap-2 p-3 bg-white/5 text-[10px] font-bold uppercase tracking-widest transition-all hover:bg-white/10">
                <i data-lucide="palette"></i> Режим
            </button>
            <button onclick="location.reload()" class="w-full p-3 bg-red-500/10 text-red-400 text-[10px] font-bold uppercase transition-all">Чиқиш</button>
        </div>
    </aside>

    <main id="main-content" style="display: none;">
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col">
                <h2 id="page-title" class="text-5xl font-black italic uppercase">Boshqaruv</h2>
                <p id="admin-name-display" class="text-cyan-400 font-bold uppercase text-[12px] tracking-widest mt-2"></p>
            </div>
            <div class="bg-black/20 p-4 border border-white/5 text-right">
                <p id="live-time" class="text-2xl font-black text-cyan-400">00:00</p>
                <p id="live-date" class="text-[10px] font-bold text-gray-500 uppercase">-- -- --</p>
            </div>
        </header>

        <div id="dashboard" class="space-y-6">
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
        </div>

        <div id="students" class="hidden space-y-6">
            <div id="student-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </div>

        <div id="weekly" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-7 gap-4">
                <div class="day-column"><div class="bg-blue-600 p-3 text-center text-white font-black uppercase text-xs mb-4">Dushanba</div></div>
                <div class="day-column"><div class="bg-gray-700 p-3 text-center text-white font-black uppercase text-xs mb-4">Seshanba</div></div>
                <div class="day-column"><div class="bg-gray-800 p-3 text-center opacity-50 text-xs font-bold uppercase">Chorshanba</div></div>
                <div class="day-column"><div class="bg-gray-800 p-3 text-center opacity-50 text-xs font-bold uppercase">Payshanba</div></div>
                <div class="day-column"><div class="bg-gray-800 p-3 text-center opacity-50 text-xs font-bold uppercase">Juma</div></div>
                <div class="day-column"><div class="bg-gray-800 p-3 text-center opacity-50 text-xs font-bold uppercase">Shanba</div></div>
                <div class="day-column"><div class="bg-gray-800 p-3 text-center opacity-50 text-xs font-bold uppercase">Yakshanba</div></div>
            </div>
        </div>

        <div id="add" class="hidden space-y-12">
            <div class="max-w-xl mx-auto glass-panel p-10 border border-blue-500/20">
                <h3 class="text-2xl font-black mb-6 uppercase italic text-cyan-400">O'qituvchi Qo'shish</h3>
                <div class="space-y-4">
                    <input id="in-ifsh" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="O'qituvchi F.I.Sh">
                    <input id="in-fan" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Fan nomi">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="in-sana" type="date" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none">
                        <input id="in-image" type="file" accept="image/*" class="w-full bg-white/5 border border-white/10 p-3 text-[10px] text-gray-400">
                    </div>
                    <button onclick="saveTeacher()" class="w-full bg-blue-600 p-4 font-black uppercase text-white hover:bg-blue-500">Saqlash</button>
                </div>
            </div>

            <div class="max-w-xl mx-auto glass-panel p-10 border border-green-500/20">
                <h3 class="text-2xl font-black mb-6 uppercase italic text-green-400">Talaba Qo'shish</h3>
                <div class="space-y-4">
                    <input id="st-name" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Talaba F.I.Sh">
                    <input id="st-group" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Guruhi">
                    <button onclick="saveStudent()" class="w-full bg-green-600 p-4 font-black uppercase text-white hover:bg-green-500">Talabani Saqlash</button>
                </div>
            </div>
        </div>

        <div id="admin" class="hidden space-y-8">
            <div class="max-w-2xl mx-auto glass-panel p-10 border border-cyan-500/30">
                <h3 class="text-3xl font-black mb-8 uppercase text-white flex items-center gap-3">
                    <i data-lucide="user-cog" class="text-cyan-400"></i> Admin Sozlamalari
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <input id="adm-f" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Familiya">
                        <input id="adm-i" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Ism">
                        <input id="adm-o" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Otasining ismi">
                    </div>
                    <div class="space-y-4">
                        <input id="adm-user" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Login">
                        <input id="adm-pass" type="password" class="w-full bg-white/5 border border-white/10 p-4 text-white outline-none" placeholder="Parol">
                    </div>
                </div>
                <button onclick="updateAdminSettings()" class="w-full mt-8 bg-cyan-600 p-4 font-black uppercase text-white hover:bg-cyan-500 transition-all">Yangilash</button>
            </div>
        </div>
    </main>

    <script>
        // 1. DATABASE ВА СОЗЛАМАЛАР
        let adminSettings = JSON.parse(localStorage.getItem('sarbon_admin')) || {
            user: "admin", pass: "sarbon2026", f: "Sarbon", i: "Admin", o: "Universiteti"
        };
        let db = JSON.parse(localStorage.getItem('sarbon_v55')) || [];
        let studentsDb = JSON.parse(localStorage.getItem('sarbon_students')) || [];

        // 2. AUTH ВА ТЕМА
        function checkAuth() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if(u === adminSettings.user && p === adminSettings.pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-aside').style.display = 'flex';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('admin-name-display').innerText = `${adminSettings.f} ${adminSettings.i} ${adminSettings.o}`;
                lucide.createIcons();
                showPage('dashboard');
            } else { document.getElementById('error-msg').classList.remove('hidden'); }
        }

        let currentTheme = 0;
        function cycleTheme() {
            const themes = ['', 'light-mode', 'ocean-mode'];
            document.body.classList.remove('light-mode', 'ocean-mode');
            currentTheme = (currentTheme + 1) % themes.length;
            if(themes[currentTheme]) document.body.classList.add(themes[currentTheme]);
        }

        // 3. САҲИФАЛАРНИ БОШҚАРИШ
        function showPage(id) {
            document.querySelectorAll('main > div').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id === 'dashboard' ? 'Boshqaruv' : id.toUpperCase();
            
            if(id === 'dashboard') renderDashboard();
            if(id === 'students') renderStudents();
            if(id === 'admin') loadAdminForm();
            lucide.createIcons();
        }

        // 4. ТАЛАБАЛАРНИ РЕНДЕР ҚИЛИШ (СИЗ СЎРАГАН ЖОЙ)
        function renderStudents() {
            const grid = document.getElementById('student-grid');
            if (studentsDb.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 p-4">Ҳозирча талабалар йўқ.</p>';
                return;
            }
            grid.innerHTML = studentsDb.slice().reverse().map(s => `
                <div class="glass-panel p-5 border border-white/5 flex items-center gap-4">
                    <div class="w-10 h-10 bg-green-500/20 flex items-center justify-center text-green-400">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white uppercase text-sm">${s.name}</h4>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider">${s.group}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 5. МАЪЛУМОТЛАРНИ САҚЛАШ
        function saveTeacher() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const file = document.getElementById('in-image').files[0];
            if(!ifsh || !fan) return alert("To'ldiring!");

            const reader = new FileReader();
            if(file) {
                reader.onloadend = function() {
                    db.push({ id: Date.now(), ifsh, fan, sana, img: reader.result });
                    localStorage.setItem('sarbon_v55', JSON.stringify(db));
                    showPage('dashboard');
                };
                reader.readAsDataURL(file);
            } else {
                db.push({ id: Date.now(), ifsh, fan, sana, img: null });
                localStorage.setItem('sarbon_v55', JSON.stringify(db));
                showPage('dashboard');
            }
        }

        function saveStudent() {
            const name = document.getElementById('st-name').value;
            const group = document.getElementById('st-group').value;
            if(!name || !group) return alert("Ma'lumotlarni to'ldiring!");
            studentsDb.push({ id: Date.now(), name, group });
            localStorage.setItem('sarbon_students', JSON.stringify(studentsDb));
            alert("Talaba saqlandi!");
            showPage('students');
        }

        function updateAdminSettings() {
            adminSettings.f = document.getElementById('adm-f').value;
            adminSettings.i = document.getElementById('adm-i').value;
            adminSettings.o = document.getElementById('adm-o').value;
            adminSettings.user = document.getElementById('adm-user').value;
            adminSettings.pass = document.getElementById('adm-pass').value;
            localStorage.setItem('sarbon_admin', JSON.stringify(adminSettings));
            document.getElementById('admin-name-display').innerText = `${adminSettings.f} ${adminSettings.i} ${adminSettings.o}`;
            alert("Sozlamalar yangilandi!");
        }

        function loadAdminForm() {
            document.getElementById('adm-f').value = adminSettings.f;
            document.getElementById('adm-i').value = adminSettings.i;
            document.getElementById('adm-o').value = adminSettings.o;
            document.getElementById('adm-user').value = adminSettings.user;
            document.getElementById('adm-pass').value = adminSettings.pass;
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-panel p-6 flex items-center gap-6 border border-white/5">
                    ${t.img ? `<img src="${t.img}" class="w-16 h-16 object-cover border border-cyan-500/30">` : 
                    `<div class="w-16 h-16 bg-blue-600/20 flex items-center justify-center text-blue-400 font-bold text-2xl uppercase">${t.ifsh[0]}</div>`}
                    <div>
                        <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">${t.ifsh}</span>
                        <h4 class="text-xl font-black italic uppercase text-white">${t.fan}</h4>
                        <p class="text-[10px] font-bold text-white/50 mt-1 uppercase">📅 ${t.sana}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-date').innerText = now.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
