<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarbon - Integrated Dark System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-maroon: #ff2e3d;
            --dark-navy: #0a0f18;
            --card-bg: #131a27;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-navy); color: #ffffff; overflow-x: hidden; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Neon Effects */
        .neon-text { text-shadow: 0 0 10px var(--neon-maroon); }
        .neon-border { border: 1px solid rgba(255, 46, 61, 0.2); transition: all 0.3s; }
        .neon-border:hover { border-color: var(--neon-maroon); box-shadow: 0 0 15px rgba(255, 46, 61, 0.1); }
        
        /* Sidebar Navigation */
        .sidebar { background: #070b11; border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-link { cursor: pointer; transition: all 0.3s; border-radius: 12px; margin-bottom: 8px; border-left: 0 solid transparent; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(90deg, rgba(255, 46, 61, 0.1) 0%, transparent 100%); color: var(--neon-maroon); border-left: 4px solid var(--neon-maroon); }

        /* Cyber Inputs */
        .cyber-input {
            width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; outline: none;
            color: white; font-weight: 600; transition: all 0.3s;
        }
        .cyber-input:focus { border-color: var(--neon-maroon); background: rgba(255,46,61,0.05); }

        /* Schedule Styling */
        .day-column { background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); min-height: 500px; padding: 10px; }
        .day-header { font-family: 'Orbitron', sans-serif; text-align: center; padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 10px; background: rgba(255,255,255,0.05); color: #64748b; letter-spacing: 2px; }
        .day-header.active { background: var(--neon-maroon); color: white; box-shadow: 0 0 10px var(--neon-maroon); }
        
        .lesson-card { border-radius: 15px; padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--neon-maroon); background: rgba(255,255,255,0.03); }
        .teacher-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon-maroon); margin: 0 auto 15px; box-shadow: 0 0 10px rgba(255,46,61,0.3); }

        .sarbon-logo-core {
            width: 45px; height: 45px; background: var(--neon-maroon);
            clip-path: polygon(100% 0, 100% 70%, 70% 100%, 0 100%, 0 0);
            position: relative;
        }
        .sarbon-logo-core::after { content: 'S'; color: white; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 sidebar p-8 flex flex-col hidden lg:flex sticky top-0 h-screen">
        <div class="flex items-center gap-4 mb-16">
            <div class="sarbon-logo-core"></div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white leading-none">SARBON</h1>
                <p class="text-[10px] font-bold text-[#ff2e3d] tracking-[4px] uppercase mt-1 text-xs">SYSTEMS</p>
            </div>
        </div>

        <nav class="space-y-2 flex-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active flex items-center gap-4 px-6 py-4 font-bold text-xs uppercase tracking-widest">
                <span>⚡</span> Terminal
            </div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-link flex items-center gap-4 px-6 py-4 font-bold text-xs uppercase tracking-widest">
                <span>🗓</span> Schedule
            </div>
            <div onclick="showPage('add')" id="nav-add" class="nav-link flex items-center gap-4 px-6 py-4 font-bold text-xs uppercase tracking-widest">
                <span>➕</span> Deploy New
            </div>
        </nav>

        <div class="p-4 rounded-xl bg-white/5 border border-white/10 text-center">
            <p class="text-[9px] font-bold text-gray-500 uppercase mb-1">Database Status</p>
            <p class="text-xs text-green-500 font-bold neon-text uppercase">Sync Active</p>
        </div>
    </aside>

    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        
        <div id="dashboard" class="page active">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-5xl font-black text-white tracking-tighter uppercase italic">Control Panel</h2>
                    <div class="h-1 w-20 bg-[#ff2e3d] mt-2"></div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Total Nodes</p>
                    <p class="text-3xl font-black text-white italic" id="total-teachers">0</p>
                </div>
            </div>
            <div id="teacher-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="weekly" class="page">
            <h2 class="text-4xl font-black text-white uppercase italic mb-10 tracking-tighter">System <span class="text-[#ff2e3d]">Schedule</span></h2>
            <div class="grid grid-cols-7 gap-3">
                <div class="day-column" id="col-1"><div class="day-header active">MON</div><div class="container"></div></div>
                <div class="day-column" id="col-2"><div class="day-header">TUE</div><div class="container"></div></div>
                <div class="day-column" id="col-3"><div class="day-header">WED</div><div class="container"></div></div>
                <div class="day-column" id="col-4"><div class="day-header">THU</div><div class="container"></div></div>
                <div class="day-column" id="col-5"><div class="day-header">FRI</div><div class="container"></div></div>
                <div class="day-column" id="col-6"><div class="day-header">SAT</div><div class="container"></div></div>
                <div class="day-column" id="col-7"><div class="day-header">SUN</div><div class="container"></div></div>
            </div>
        </div>

        <div id="add" class="page">
            <h2 class="text-4xl font-black text-white uppercase italic mb-10 tracking-tighter">Deploy <span class="text-[#ff2e3d]">New Data</span></h2>
            <div class="glass-panel p-10 bg-[#131a27] border border-white/5 rounded-[30px] max-w-4xl shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Instructor ID</label>
                        <input id="in-ifsh" type="text" placeholder="SARBON-001" class="cyber-input">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Subject Module</label>
                        <input id="in-fan" type="text" placeholder="Advanced Cyber" class="cyber-input">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Execution Date</label>
                        <input id="in-sana" type="date" class="cyber-input">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Visual Identity (Image)</label>
                        <input id="in-image" type="file" accept="image/*" class="cyber-input text-xs pt-4">
                    </div>
                </div>
                <div class="flex justify-end">
                    <button onclick="saveAll()" class="bg-[#ff2e3d] text-white px-12 py-4 rounded-xl font-black hover:scale-105 transition-all shadow-[0_0_20px_rgba(255,46,61,0.4)] uppercase text-xs tracking-widest">Execute Save</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_integrated_db')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'dashboard') renderDashboard();
            if(id === 'weekly') renderWeekly();
        }

        async function saveAll() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgInput = document.getElementById('in-image');
            const vaqt = new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });

            if(!ifsh || !fan || !sana) return alert("System Error: Missing Parameters!");

            let base64Img = "";
            if(imgInput.files[0]) {
                base64Img = await new Promise(r => {
                    const fr = new FileReader(); fr.readAsDataURL(imgInput.files[0]);
                    fr.onload = () => r(fr.result);
                });
            }

            const dayNum = new Date(sana).getDay();
            const normalizedDay = dayNum === 0 ? 7 : dayNum;

            db.push({ id: Date.now(), ifsh, fan, sana, vaqt, img: base64Img, day: normalizedDay });
            localStorage.setItem('sarbon_integrated_db', JSON.stringify(db));
            
            // Clear inputs
            document.getElementById('in-ifsh').value = '';
            document.getElementById('in-fan').value = '';
            imgInput.value = '';
            
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            document.getElementById('total-teachers').innerText = db.length;
            grid.innerHTML = db.map(t => `
                <div class="bg-[#131a27] p-8 rounded-[30px] neon-border text-center relative group overflow-hidden">
                    <button onclick="deleteItem(${t.id})" class="absolute top-5 right-5 text-gray-600 hover:text-[#ff2e3d] font-bold z-10">×</button>
                    <div class="absolute -right-4 -top-4 text-6xl opacity-5 font-black italic uppercase">${t.ifsh.slice(-2)}</div>
                    ${t.img ? `<img src="${t.img}" class="teacher-avatar">` : `<div class="teacher-avatar bg-white/5 flex items-center justify-center text-[10px] text-gray-500 uppercase">No Data</div>`}
                    <div class="mb-6">
                        <span class="text-[9px] font-bold text-[#ff2e3d] uppercase tracking-[3px]">Module ID: ${t.ifsh}</span>
                        <h4 class="text-xl font-black text-white uppercase mt-1 tracking-tight italic">${t.fan}</h4>
                    </div>
                    <div class="flex items-center justify-between border-t border-white/5 pt-5 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                        <span>📅 ${t.sana}</span> <span class="text-[#ff2e3d]">⏰ ${t.vaqt}</span>
                    </div>
                </div>
            `).reverse().join('');
        }

        function renderWeekly() {
            document.querySelectorAll('.day-column .container').forEach(c => c.innerHTML = '');
            db.forEach((item) => {
                const container = document.querySelector(`#col-${item.day} .container`);
                if(container) {
                    container.innerHTML += `
                        <div class="lesson-card">
                            <div class="flex items-center gap-2 mb-2">
                                ${item.img ? `<img src="${item.img}" class="w-5 h-5 rounded-full object-cover border border-[#ff2e3d]">` : ''}
                                <span class="text-[10px] font-black uppercase text-white truncate">${item.fan}</span>
                            </div>
                            <div class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter italic">ID: ${item.ifsh} | ${item.vaqt}</div>
                        </div>
                    `;
                }
            });
        }

        function deleteItem(id) {
            if(confirm("Confirm Deletion?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('sarbon_integrated_db', JSON.stringify(db));
                renderDashboard();
            }
        }

        // Initialize
        renderDashboard();
    </script>
</body>
</html>
