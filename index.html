<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON - Тизим Бошқаруви</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --main-bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--main-bg); 
            background-image: radial-gradient(circle at 50% 50%, #101520 0%, #05070a 100%);
            color: #e2e8f0; 
            min-height: 100vh;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .neon-btn {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }
        .neon-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.6); }

        .nav-item { transition: 0.3s; border-radius: 15px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); border-left: 4px solid var(--accent); }

        /* Таймер блоки */
        .status-header {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.05), transparent);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 0 20px 20px 0;
        }

        .page { display: none; animation: fadeIn 0.5s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px !important; }
    </style>
</head>
<body class="flex">

    <aside class="w-80 h-screen sticky top-0 p-8 flex flex-col border-r border-white/5">
        <div class="mb-12">
            <h1 class="orbitron text-3xl font-black tracking-widest text-white">SARBON</h1>
            <p class="text-[10px] text-cyan-400 font-bold tracking-[5px] uppercase">Университет</p>
        </div>

        <nav class="space-y-4 flex-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-item active p-4 flex items-center gap-4 font-bold text-sm uppercase">
                <span>📡</span> Терминал
            </div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-item p-4 flex items-center gap-4 font-bold text-sm uppercase">
                <span>🌀</span> Дарс Жадвали
            </div>
            <div onclick="showPage('add')" id="nav-add" class="nav-item p-4 flex items-center gap-4 font-bold text-sm uppercase">
                <span>⚡</span> Янги Кўшиш
            </div>
        </nav>

        <div class="mt-auto p-4 glass-card text-center border-cyan-900/30">
            <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Тизим ҳолати</p>
            <p class="text-xs text-cyan-400 font-bold">ФАОЛ</p>
        </div>
    </aside>

    <main class="flex-1 p-12">
        
        <header class="flex justify-between items-center mb-16">
            <div class="status-header">
                <h2 class="text-xs font-black text-cyan-500 uppercase tracking-[4px] mb-2">Бошқарув панели</h2>
                <h3 class="text-4xl font-black italic uppercase">Асосий Ойна</h3>
            </div>

            <div class="glass-card px-8 py-4 flex gap-8 items-center border-cyan-500/20">
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Сана</p>
                    <p class="orbitron text-lg font-bold text-white tracking-tighter">📅 2026-04-15</p>
                </div>
                <div class="h-8 w-[1px] bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Вақт</p>
                    <p class="orbitron text-lg font-bold text-cyan-400 neon-text">⏰ 00:19</p>
                </div>
            </div>
        </header>

        <div id="dashboard" class="page active">
            <div id="teacher-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>

        <div id="weekly" class="page">
            <div class="grid grid-cols-7 gap-4">
                <div class="day-col" id="col-1"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">ДУШ</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-2"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">СЕШ</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-3"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">ЧОР</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-4"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">ПАЙ</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-5"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">ЖУМ</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-6"><div class="text-center mb-4 text-[10px] font-black text-cyan-500 orbitron">ШАН</div><div class="container space-y-3"></div></div>
                <div class="day-col" id="col-7"><div class="text-center mb-4 text-[10px] font-black text-gray-600 orbitron">ЯКШ</div><div class="container space-y-3"></div></div>
            </div>
        </div>

        <div id="add" class="page">
            <div class="max-w-2xl glass-card p-10 mx-auto border-cyan-500/10">
                <h4 class="text-2xl font-black italic mb-8 border-b border-white/5 pb-4 uppercase">Янги маълумот киритиш</h4>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase block mb-2 ml-1">Ўқитувчи ID ёки Исми</label>
                        <input id="in-ifsh" type="text" class="w-full p-4 cyber-input outline-none" placeholder="Масалан: Анвар Алимов">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase block mb-2 ml-1">Фан номи</label>
                        <input id="in-fan" type="text" class="w-full p-4 cyber-input outline-none" placeholder="Масалан: Иқтисодиёт">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase block mb-2 ml-1">Сана</label>
                            <input id="in-sana" type="date" class="w-full p-4 cyber-input outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase block mb-2 ml-1">Расм (Аватар)</label>
                            <input id="in-image" type="file" accept="image/*" class="w-full p-3 text-xs">
                        </div>
                    </div>
                    <button onclick="saveAll()" class="w-full neon-btn py-5 rounded-xl font-black uppercase tracking-widest text-sm mt-4">Тизимга сақлаш</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_v3_db')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'dashboard') renderDashboard();
            if(id === 'weekly') renderWeekly();
        }

        async function saveAll() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgInput = document.getElementById('in-image');
            const vaqt = new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });

            if(!ifsh || !fan || !sana) return alert("Маълумотни тўлиқ киритинг!");

            let base64Img = "";
            if(imgInput.files[0]) {
                base64Img = await new Promise(r => {
                    const fr = new FileReader(); fr.readAsDataURL(imgInput.files[0]);
                    fr.onload = () => r(fr.result);
                });
            }

            const dayNum = new Date(sana).getDay();
            const normalizedDay = dayNum === 0 ? 7 : dayNum;

            db.push({ id: Date.now(), ifsh, fan, sana, vaqt, img: base64Img, day: normalizedDay });
            localStorage.setItem('sarbon_v3_db', JSON.stringify(db));
            
            document.getElementById('in-ifsh').value = '';
            document.getElementById('in-fan').value = '';
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.map(t => `
                <div class="glass-card p-6 relative group overflow-hidden border-white/5 hover:border-cyan-500/50 transition-all">
                    <button onclick="deleteItem(${t.id})" class="absolute top-4 right-4 text-gray-600 hover:text-red-500 transition font-bold">Очириш</button>
                    <div class="flex items-center gap-6">
                        ${t.img ? `<img src="${t.img}" class="w-20 h-20 rounded-2xl object-cover border-2 border-cyan-500/20 shadow-[0_0_15px_rgba(0,242,255,0.1)]">` : `<div class="w-20 h-20 rounded-2xl bg-white/5 flex items-center justify-center text-[10px] text-gray-500">IMAGE</div>`}
                        <div>
                            <p class="text-[9px] font-black text-cyan-500 uppercase tracking-widest">${t.ifsh}</p>
                            <h4 class="text-xl font-black text-white italic uppercase">${t.fan}</h4>
                            <div class="mt-3 flex gap-4 text-[10px] font-bold text-gray-500 uppercase">
                                <span>📅 ${t.sana}</span>
                                <span class="text-white">⏰ ${t.vaqt}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).reverse().join('');
        }

        function renderWeekly() {
            document.querySelectorAll('.day-col .container').forEach(c => c.innerHTML = '');
            db.forEach((item) => {
                const container = document.querySelector(`#col-${item.day} .container`);
                if(container) {
                    container.innerHTML += `
                        <div class="p-3 bg-white/5 rounded-xl border-l-2 border-cyan-500">
                            <p class="text-[10px] font-black text-white uppercase truncate">${item.fan}</p>
                            <p class="text-[8px] text-gray-500 uppercase font-bold mt-1">${item.vaqt}</p>
                        </div>
                    `;
                }
            });
        }

        function deleteItem(id) {
            if(confirm("Очирилсинми?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('sarbon_v3_db', JSON.stringify(db));
                renderDashboard();
            }
        }

        renderDashboard();
    </script>
</body>
</html>
