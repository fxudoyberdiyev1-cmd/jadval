<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager Pro - Sarbon Universiteti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-item:hover, .active-nav { background-color: #f1f5f9; color: #2D4363; font-weight: 800; border-right: 4px solid #7A2E32; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Логотип учун махсус стиллар */
        .sarbon-logo-shape-big { width: 60px; height: 60px; background-color: #2D4363; border-bottom-left-radius: 100%; }
        .sarbon-logo-shape-small { width: 22px; height: 22px; background-color: #2D4363; border-top-right-radius: 100%; position: absolute; bottom: 0; left: 0; }
        
        .calendar-day.has-data { background-color: #fee2e2; border: 2px solid #7A2E32; color: #7A2E32; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-white border-r border-gray-200 sticky top-0 h-screen flex flex-col shadow-sm">
            <div class="p-10 flex flex-col items-center">
                <div class="relative w-[80px] h-[80px] mb-4">
                    <div class="sarbon-logo-shape-big ml-auto"></div>
                    <div class="sarbon-logo-shape-small"></div>
                </div>
                <div class="text-center leading-tight">
                    <span class="block text-xl font-extrabold tracking-tighter text-[#7A2E32]">Sarbon</span>
                    <span class="block text-xl font-extrabold tracking-tighter text-[#7A2E32]">Universiteti<small class="text-[10px] align-top">®</small></span>
                </div>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <div onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-item active-nav px-6 py-4 cursor-pointer flex items-center gap-3 rounded-xl transition">🏠 Dashboard</div>
                <div onclick="showPage('talabalar')" id="nav-talabalar" class="sidebar-item px-6 py-4 cursor-pointer flex items-center gap-3 rounded-xl transition">🎓 Talabalar</div>
                <div onclick="showPage('jadval')" id="nav-jadval" class="sidebar-item px-6 py-4 cursor-pointer flex items-center gap-3 rounded-xl transition">📅 Tarix</div>
            </nav>

            <div class="p-6 border-t bg-red-50/30">
                <div class="flex items-center gap-2 mb-1 text-[#7A2E32] font-bold text-[10px] uppercase tracking-widest">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> Tizimda:
                </div>
                <p class="text-[11px] text-gray-500 font-medium">Sarbon Admin Panel v2.0</p>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <div class="flex justify-between items-center mb-10 bg-white/60 p-4 rounded-3xl border border-white shadow-sm backdrop-blur-md">
                <h2 id="page-title" class="text-3xl font-black text-[#2D4363] tracking-tight">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right mr-2">
                        <p class="text-xs font-bold text-gray-400 uppercase">Xush kelibsiz</p>
                        <p class="text-sm font-black text-[#2D4363]">ADMINSTRATOR</p>
                    </div>
                    <img id="profile-img" src="https://avatar.iran.liara.run/public/31" class="w-12 h-12 rounded-full border-2 border-[#7A2E32] cursor-pointer shadow-md" onclick="document.getElementById('upload-img').click()">
                    <input type="file" id="upload-img" class="hidden" onchange="updatePhoto(this)">
                </div>
            </div>

            <div id="dashboard" class="page active">
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100 mb-10">
                    <h3 class="text-xl font-black mb-6 text-[#2D4363]">📚 Yangi dars kiritish</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <input id="in-fan" type="text" placeholder="Fan nomi" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#7A2E32] font-semibold">
                        <input id="in-mavzu" type="text" placeholder="Mavzu" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#7A2E32] font-semibold">
                        <input id="in-sana" type="date" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#7A2E32] font-semibold">
                        <button onclick="saveData()" class="bg-[#2D4363] text-white rounded-2xl font-black hover:bg-[#1a2a3f] shadow-lg transition uppercase text-sm tracking-widest">Saqlash</button>
                    </div>
                </div>
                <div id="lessons-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <div id="talabalar" class="page">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border">
                    <h3 class="text-2xl font-black mb-8 text-[#2D4363]">👤 Talabalar bazasi</h3>
                    <div class="flex gap-4 mb-10">
                        <input id="in-ifsh" type="number" placeholder="IFSH kodi" class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none font-bold">
                        <input id="in-ism" type="text" placeholder="F.I.SH" class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none font-bold">
                        <button onclick="saveStudent()" class="bg-[#7A2E32] text-white px-10 rounded-2xl font-black uppercase text-sm tracking-widest hover:bg-red-900 transition">Qo'shish</button>
                    </div>
                    <div id="student-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <div id="jadval" class="page">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border">
                    <h3 class="text-2xl font-black mb-10 text-center text-[#2D4363]">📅 Kalendar va Mavzular</h3>
                    <div class="grid grid-cols-7 gap-3 mb-10" id="calendar-grid"></div>
                    <div id="history-detail" class="bg-red-50 p-8 rounded-[32px] hidden border border-red-100 shadow-inner">
                        <h4 class="font-black text-[#7A2E32] mb-6 text-xl" id="history-date"></h4>
                        <div id="history-content" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('edu_db')) || [];
        let students = JSON.parse(localStorage.getItem('edu_students')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'dashboard') renderDashboard();
            if(id === 'jadval') renderCalendar();
            if(id === 'talabalar') renderStudents();
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        }

        function saveData() {
            const fan = document.getElementById('in-fan').value;
            const mavzu = document.getElementById('in-mavzu').value;
            const sana = document.getElementById('in-sana').value;
            if(!fan || !sana) return alert("Ma'lumotlarni to'ldiring!");
            db.push({ id: Date.now(), fan, mavzu, sana, time: new Date().toLocaleTimeString() });
            localStorage.setItem('edu_db', JSON.stringify(db));
            document.getElementById('in-fan').value = '';
            document.getElementById('in-mavzu').value = '';
            renderDashboard();
        }

        function removeData(id) {
            if(confirm("O'chirilsinmi?")) {
                db = db.filter(item => item.id !== id);
                localStorage.setItem('edu_db', JSON.stringify(db));
                renderDashboard();
            }
        }

        function renderDashboard() {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = db.map(item => `
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-50 relative group hover:shadow-2xl transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-red-50 text-[#7A2E32] rounded-2xl flex items-center justify-center text-2xl font-black italic">${item.fan.charAt(0)}</div>
                        <button onclick="removeData(${item.id})" class="text-red-300 hover:text-red-600 font-bold p-2 text-xs">O'chirish</button>
                    </div>
                    <h3 class="text-2xl font-black text-gray-900 mb-2 tracking-tighter uppercase">${item.fan}</h3>
                    <p class="text-gray-500 font-bold text-sm mb-6">${item.mavzu || 'Mavzu kiritilmagan'}</p>
                    <div class="flex justify-between text-[10px] font-black text-[#2D4363] border-t pt-6 opacity-60">
                        <span>📅 ${item.sana}</span>
                        <span>⏰ ${item.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function saveStudent() {
            const ifsh = document.getElementById('in-ifsh').value;
            const ism = document.getElementById('in-ism').value;
            if(!ifsh || !ism) return alert("To'ldiring!");
            students.push({ id: Date.now(), ifsh, ism });
            localStorage.setItem('edu_students', JSON.stringify(students));
            document.getElementById('in-ifsh').value = '';
            document.getElementById('in-ism').value = '';
            renderStudents();
        }

        function removeStudent(id) {
            students = students.filter(s => s.id !== id);
            localStorage.setItem('edu_students', JSON.stringify(students));
            renderStudents();
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            list.innerHTML = students.map(s => `
                <div class="p-5 bg-white rounded-2xl border flex justify-between items-center shadow-sm hover:border-[#7A2E32] transition">
                    <div class="flex flex-col">
                        <span class="text-[#7A2E32] font-black text-[10px]">IFSH: ${s.ifsh}</span>
                        <span class="font-bold text-[#2D4363]">${s.ism}</span>
                    </div>
                    <button onclick="removeStudent(${s.id})" class="text-red-400 font-bold text-xs">O'chirish</button>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const days = ["Du", "Se", "Ch", "Pa", "Ju", "Sh", "Ya"];
            days.forEach(d => {
                grid.innerHTML += `<div class="font-black text-gray-300 text-[10px] uppercase text-center p-2">${d}</div>`;
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();

            for(let i=1; i<=lastDay; i++) {
                const dayStr = i.toString().padStart(2, '0');
                const monthStr = (month + 1).toString().padStart(2, '0');
                const dateStr = `${year}-${monthStr}-${dayStr}`;
                
                const hasData = db.some(l => l.sana === dateStr);
                grid.innerHTML += `<div onclick="showHistory('${dateStr}')" class="calendar-day p-6 border rounded-[20px] text-center font-bold ${hasData ? 'has-data shadow-lg' : 'bg-white text-gray-200'}">${i}</div>`;
            }
        }

        function showHistory(sana) {
            const detail = document.getElementById('history-detail');
            const content = document.getElementById('history-content');
            const filtered = db.filter(l => l.sana === sana);
            if(filtered.length > 0) {
                detail.classList.remove('hidden');
                document.getElementById('history-date').innerText = sana + " kungi darslar:";
                content.innerHTML = filtered.map(f => `
                    <div class="p-6 bg-white rounded-3xl border-l-8 border-[#7A2E32] shadow-sm">
                        <h5 class="font-black text-[#2D4363] uppercase">${f.fan}</h5>
                        <p class="text-gray-600 text-sm italic">${f.mavzu}</p>
                    </div>
                `).join('');
            } else {
                detail.classList.add('hidden');
                alert("Ushbu kunda darslar mavjud emas.");
            }
        }

        function updatePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('profile-img').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        renderDashboard();
    </script>
</body>
</html>
