<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON UNIVERSITY | Portal v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-cyan: #00f2ff; 
            --bg-body: #05070a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-main: #f1f5f9;
        }
        .light-mode {
            --bg-body: #f8fafc;
            --card-bg: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --accent-cyan: #2563eb;
        }
        .ocean-mode {
            --bg-body: #0f172a;
            --card-bg: rgba(30, 58, 138, 0.3);
            --accent-cyan: #38bdf8;
            --text-main: #e0f2fe;
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-main); 
            min-height: 100vh; margin: 0; display: flex; overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .modern-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            position: relative;
        }
        .light-mode .modern-card { border-color: rgba(0,0,0,0.1); }
        .modern-card:hover { border-color: var(--accent-cyan); transform: translateY(-5px); }

        aside { 
            width: 280px; 
            background: rgba(8, 10, 12, 0.98); 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; padding: 2.5rem 1.2rem;
            transition: background 0.4s ease;
        }
        .light-mode aside { background: #fff; border-right: 1px solid #e2e8f0; }

        .nav-link { 
            padding: 1.2rem; margin-bottom: 0.6rem; cursor: pointer; display: flex; 
            align-items: center; gap: 15px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1.5px; font-size: 11px; color: #64748b; transition: 0.3s; 
        }
        .nav-link.active { background: rgba(0, 242, 255, 0.06); color: var(--accent-cyan); border: 1px solid rgba(0, 242, 255, 0.3); }

        main { flex: 1; padding: 4rem; overflow-y: auto; }
        
        .logo-box { 
            background: var(--accent-cyan); width: 48px; height: 48px; 
            display: flex; align-items: center; justify-content: center; 
            clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%); 
            transition: background 0.4s ease;
        }

        input, select, textarea { 
            background: var(--card-bg) !important; border: 1px solid rgba(255,255,255,0.1) !important; 
            color: var(--text-main) !important; padding: 1.2rem !important; border-radius: 0px !important; outline: none !important; 
        }
        .btn-primary { background: var(--accent-cyan); color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; padding: 1.2rem; cursor: pointer; border: none; }
        
        .del-btn {
            position: absolute; top: 10px; right: 10px;
            width: 24px; height: 24px; background: rgba(239, 68, 68, 0.2);
            color: #ef4444; border-radius: 4px; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; opacity: 0;
        }
        .modern-card:hover .del-btn { opacity: 1; }
        .del-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[1000] bg-[#05070a] flex items-center justify-center">
        <div class="modern-card p-14 w-[420px] text-center border-t-4 border-t-cyan-400">
            <div class="flex justify-center mb-8"><div class="logo-box"><i data-lucide="lock" class="text-white"></i></div></div>
            <h2 class="text-3xl font-black uppercase tracking-[12px] mb-10 italic">Sarbon OS</h2>
            <div class="space-y-5">
                <input id="login-user" type="text" placeholder="LOGIN" class="w-full">
                <input id="login-pass" type="password" placeholder="PASSWORD" class="w-full">
                <button onclick="checkAuth()" class="w-full btn-primary">Sign In</button>
            </div>
        </div>
    </div>

    <aside id="main-aside" style="display: none;">
        <div class="flex items-center gap-4 px-4 mb-16">
            <div class="logo-box text-white"><i data-lucide="graduation-cap"></i></div>
            <div>
                <h1 class="text-2xl font-black uppercase italic">Sarbon</h1>
                <p class="text-[8px] tracking-[5px] text-cyan-400 uppercase font-black">University</p>
            </div>
        </div>
        <nav class="flex-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active"><i data-lucide="grid"></i> O'qituvchilar</div>
            <div onclick="showPage('students')" id="nav-students" class="nav-link"><i data-lucide="users"></i> Talabalar</div>
            <div onclick="showPage('messages')" id="nav-messages" class="nav-link"><i data-lucide="message-square"></i> Savol-Javob</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-link"><i data-lucide="calendar"></i> Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-link"><i data-lucide="plus-square"></i> Qo'shish</div>
            <div onclick="showPage('admin')" id="nav-admin" class="nav-link text-cyan-400"><i data-lucide="shield"></i> Admin</div>
        </nav>
        
        <div class="space-y-2">
            <button onclick="cycleTheme()" class="w-full p-4 bg-white/5 text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                <i data-lucide="palette" class="w-4 h-4"></i> Rejimni o'zgartirish
            </button>
            <button onclick="logout()" class="w-full p-4 bg-red-500/10 text-red-500 text-[10px] font-black uppercase tracking-widest">Exit Portal</button>
        </div>
    </aside>

    <main id="main-content" style="display: none;">
        <header class="flex justify-between items-end mb-20">
            <div><h2 id="page-title" class="text-8xl font-black italic uppercase tracking-tighter leading-none">O'qituvchilar</h2><div class="h-1.5 w-32 bg-cyan-400 mt-6"></div></div>
            <div class="text-right bg-white/5 p-6 border-l-4 border-cyan-400">
                <p id="live-time" class="text-5xl font-black leading-none mb-2">00:00:00</p>
                <p id="live-date" class="text-[11px] font-black text-cyan-400 uppercase">-- -- --</p>
            </div>
        </header>

        <div id="dashboard" class="grid grid-cols-1 xl:grid-cols-2 gap-10"></div>
        <div id="students" class="hidden grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        
        <div id="messages" class="hidden grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="modern-card p-10 border-t-2 border-yellow-400">
                <h3 class="text-2xl font-black uppercase mb-8 italic">Savol Yuborish</h3>
                <div class="space-y-4">
                    <select id="msg-teacher" class="w-full"></select>
                    <input id="msg-subject" placeholder="Mavzu" class="w-full">
                    <textarea id="msg-text" placeholder="Savolingiz..." class="w-full min-h-[150px]"></textarea>
                    <button onclick="sendMessage()" class="w-full btn-primary" style="background:#fbbf24; color:#000">Yuborish</button>
                </div>
            </div>
            <div class="modern-card p-10"><h3 class="text-2xl font-black uppercase mb-8 italic">Xabarlar</h3><div id="chat-history" class="space-y-4 max-h-[400px] overflow-y-auto"></div></div>
        </div>

        <div id="weekly" class="hidden grid grid-cols-7 gap-4">
            <div class="text-center p-4 bg-cyan-400 text-black font-black uppercase text-xs">Du</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Se</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Ch</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Pa</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Ju</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Sh</div>
            <div class="text-center p-4 bg-white/5 font-black uppercase text-xs">Ya</div>
        </div>

        <div id="add" class="hidden grid grid-cols-1 md:grid-cols-2 gap-16">
            <div class="modern-card p-10 border-t-2 border-cyan-400">
                <h3 class="text-2xl font-black uppercase mb-8 italic">O'qituvchi Qo'shish</h3>
                <div class="space-y-5">
                    <input id="in-ifsh" placeholder="F.I.SH" class="w-full">
                    <input id="in-fan" placeholder="FAN NOMI" class="w-full">
                    <input id="in-sana" type="date" class="w-full">
                    <div class="space-y-2">
                        <p class="text-[10px] font-black uppercase opacity-50">Профил расмини танланг:</p>
                        <input id="in-file" type="file" accept="image/*" class="w-full cursor-pointer">
                    </div>
                    <button onclick="saveTeacher()" class="w-full btn-primary">Saqlash</button>
                </div>
            </div>
            <div class="modern-card p-10 border-t-2 border-green-500">
                <h3 class="text-2xl font-black uppercase mb-8 italic">Talaba Qo'shish</h3>
                <div class="space-y-5">
                    <input id="st-name" placeholder="TALABA ISMI" class="w-full"><input id="st-group" placeholder="GURUHI" class="w-full">
                    <button onclick="saveStudent()" class="w-full btn-primary" style="background:#22c55e">Qo'shish</button>
                </div>
            </div>
        </div>

        <div id="admin" class="hidden">
            <div class="modern-card p-12 max-w-3xl mx-auto border-t-2 border-cyan-400">
                <h3 class="text-3xl font-black uppercase mb-12 italic">Admin Settings</h3>
                <p class="text-xs text-red-500 mb-4">* Паролни GitHub-да ўзгартириш тавсия этилади.</p>
                <div class="grid grid-cols-2 gap-8">
                    <input id="adm-user" placeholder="LOGIN" class="w-full"><input id="adm-pass" type="password" placeholder="PASSWORD" class="w-full">
                </div>
                <button onclick="updateAdmin()" class="w-full btn-primary mt-10">Update</button>
            </div>
        </div>
    </main>

    <script>
        // АСОСИЙ ПАРОЛ ВА ЛОГИННИ ШУ ЕРДА ЎЗГАРТИРИНГ
        // Бу ердаги пароль ўзгарса, эски сессиялар автоматик равишда чиқариб юборилади.
        const INITIAL_ADMIN = { 
            user: "admin",      
            pass: "sarbon2026"  
        };

        let teachers = JSON.parse(localStorage.getItem('sarbon_teachers')) || [];
        let students = JSON.parse(localStorage.getItem('sarbon_students')) || [];
        let msgs = JSON.parse(localStorage.getItem('sarbon_msgs')) || [];

        window.onload = () => {
            // ХАВФСИЗЛИК ТЕКШИРУВИ:
            // Агар браузердаги пароль GitHub-даги INITIAL_ADMIN.pass га мос келмаса, чиқариб юборади.
            const savedPass = localStorage.getItem('sarbon_active_pass');
            if(localStorage.getItem('sarbon_logged') === 'true' && savedPass === INITIAL_ADMIN.pass) {
                enterPortal();
            } else {
                logout();
            }
            lucide.createIcons();
            updateClock();
        };

        function checkAuth() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            
            if(u === INITIAL_ADMIN.user && p === INITIAL_ADMIN.pass) {
                localStorage.setItem('sarbon_logged', 'true');
                localStorage.setItem('sarbon_active_pass', INITIAL_ADMIN.pass); // Жорий паролни сақлаб қўяди
                enterPortal();
            } else {
                alert("Хато логин ёки парол!");
            }
        }

        function enterPortal() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-aside').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            showPage('dashboard');
        }

        function logout() {
            localStorage.removeItem('sarbon_logged');
            localStorage.removeItem('sarbon_active_pass');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-aside').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
        }

        let themeIndex = 0;
        function cycleTheme() {
            const themes = ['', 'light-mode', 'ocean-mode'];
            document.body.classList.remove('light-mode', 'ocean-mode');
            themeIndex = (themeIndex + 1) % themes.length;
            if (themes[themeIndex]) document.body.classList.add(themes[themeIndex]);
        }

        function showPage(id) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
            const nav = document.getElementById('nav-' + id);
            if(nav) nav.classList.add('active');
            
            document.getElementById('page-title').innerText = id === 'dashboard' ? "O'qituvchilar" : (id === 'messages' ? "Savol-Javob" : id);
            if(id === 'dashboard') renderTeachers();
            if(id === 'students') renderStudents();
            if(id === 'messages') { renderMessages(); fillTeacherSelect(); }
            lucide.createIcons();
        }

        function renderTeachers() {
            document.getElementById('dashboard').innerHTML = teachers.map((t, index) => `
                <div class="modern-card p-8 flex items-center gap-8 group">
                    <div class="del-btn" onclick="deleteTeacher(${index})"><i data-lucide="x" class="w-4 h-4"></i></div>
                    <img src="${t.img || 'https://via.placeholder.com/100'}" class="w-24 h-24 object-cover border border-cyan-400/20 rounded-sm">
                    <div>
                        <p class="text-[11px] font-black text-cyan-400 uppercase tracking-[4px]">${t.ifsh}</p>
                        <h4 class="text-3xl font-black italic uppercase">${t.fan}</h4>
                        <p class="text-[10px] opacity-50 font-bold mt-4">Sana: ${t.sana}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function saveTeacher() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const fileInput = document.getElementById('in-file');
            if(!ifsh || !fan) return alert("To'ldiring!");

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    teachers.push({ ifsh, fan, sana, img: e.target.result });
                    localStorage.setItem('sarbon_teachers', JSON.stringify(teachers));
                    document.getElementById('in-ifsh').value = '';
                    document.getElementById('in-fan').value = '';
                    showPage('dashboard');
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                teachers.push({ ifsh, fan, sana, img: '' });
                localStorage.setItem('sarbon_teachers', JSON.stringify(teachers));
                showPage('dashboard');
            }
        }

        function deleteTeacher(index) {
            if(confirm("O'chirilsinmi?")) {
                teachers.splice(index, 1);
                localStorage.setItem('sarbon_teachers', JSON.stringify(teachers));
                renderTeachers();
            }
        }

        function renderStudents() {
            document.getElementById('students').innerHTML = students.map((s, index) => `
                <div class="modern-card p-6 border-l-4 border-l-cyan-400 group">
                    <div class="del-btn" onclick="deleteStudent(${index})"><i data-lucide="x" class="w-4 h-4"></i></div>
                    <h4 class="font-black uppercase">${s.name}</h4>
                    <p class="text-[10px] opacity-50 font-black mt-2">${s.group}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function saveStudent() {
            const name = document.getElementById('st-name').value;
            const group = document.getElementById('st-group').value;
            if(!name || !group) return alert("To'ldiring!");
            students.push({ name, group });
            localStorage.setItem('sarbon_students', JSON.stringify(students));
            showPage('students');
        }

        function deleteStudent(index) {
            if(confirm("O'chirilsinmi?")) {
                students.splice(index, 1);
                localStorage.setItem('sarbon_students', JSON.stringify(students));
                renderStudents();
            }
        }

        function fillTeacherSelect() {
            const sel = document.getElementById('msg-teacher');
            sel.innerHTML = '<option value="">O\'qituvchini tanlang</option>' + teachers.map(t => `<option value="${t.ifsh}">${t.ifsh}</option>`).join('');
        }

        function sendMessage() {
            const t = document.getElementById('msg-teacher').value;
            const s = document.getElementById('msg-subject').value;
            const m = document.getElementById('msg-text').value;
            if(!t || !m) return alert("To'liq ёзинг!");
            msgs.push({ t, s, m, time: new Date().toLocaleTimeString() });
            localStorage.setItem('sarbon_msgs', JSON.stringify(msgs));
            renderMessages();
            alert("Yuborildi!");
        }

        function renderMessages() {
            document.getElementById('chat-history').innerHTML = msgs.slice().reverse().map(m => `
                <div class="modern-card p-4 border-l-2 border-yellow-400 mb-2">
                    <p class="text-[9px] text-yellow-400 font-bold uppercase">Kimga: ${m.t}</p>
                    <h5 class="font-black text-xs mt-1 uppercase">${m.s}</h5>
                    <p class="text-xs opacity-70 mt-2">${m.m}</p>
                    <p class="text-[8px] text-right opacity-40 mt-2">${m.time}</p>
                </div>
            `).join('');
        }

        function updateAdmin() {
            alert("Хавфсизлик учун паролни GitHub-даги INITIAL_ADMIN қисмидан ўзгартиринг. Шунда ҳамма қурилмаларда автоматик янгиланади.");
        }

        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('live-time');
            const dateEl = document.getElementById('live-date');
            if(timeEl) timeEl.innerText = now.toLocaleTimeString('uz-UZ', { hour12: false });
            if(dateEl) dateEl.innerText = now.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
