<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Ta'lim Jadvallari</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Юқори панель */
        .top-bar { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px;
            flex-wrap: wrap; gap: 15px;
        }
        .search-input { 
            padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; width: 300px; outline: none;
        }
        .stat-badge { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; }

        /* Жадвал */
        .table-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 12px; color: #64748b; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; }
        tr:hover { background: #f8fafc; }

        /* Тугмалар */
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-excel { background: #dcfce7; color: #166534; margin-right: 5px; }
        .btn-pdf { background: #fee2e2; color: #991b1b; }
        .btn-edit { background: #f1f5f9; color: var(--primary); border: 1px solid #e2e8f0; }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Фан ёки ўқитувчи бўйича қидириш..." onkeyup="filterTable()">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="stat-badge">Ўтилган дарслар: <span id="doneCount">0</span></div>
            <button class="btn btn-excel" onclick="exportToExcel()">Excel</button>
            <button class="btn btn-pdf" onclick="exportToPDF()">PDF</button>
        </div>
    </div>

    <div class="table-card">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>№</th>
                    <th>Фан ва Ўқитувчи</th>
                    <th>Мавзу ва Сана</th>
                    <th>Ҳолати</th>
                    <th>Бошқарув</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Ҳар бир фан учун алоҳида пароль белгиланган
    const subjects = [
        { id: 0, n: "Iqtisodiyot nazariyasi 2", t: "S. Karimov", pass: "pass1" },
        { id: 1, n: "Xorijiy til 2", t: "A. Rahimova", pass: "pass2" },
        { id: 2, n: "O‘zbek (rus) tili", t: "M. G'afforov", pass: "pass3" },
        { id: 3, n: "Dinshunoslik", t: "N. Olimov", pass: "pass4" },
        { id: 4, n: "Jismoniy madaniyat", t: "V. Ivanov", pass: "pass5" },
        { id: 5, n: "Akademik ko‘nikmalar", t: "D. Zokirova", pass: "pass6" },
        { id: 6, n: "Amaliy matematika 2", t: "P. Qosimov", pass: "pass7" }
    ];

    function render() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        let done = 0;

        subjects.forEach((s) => {
            const topic = localStorage.getItem('topic_'+s.id) || "Мавзу киритилмаган";
            const time = localStorage.getItem('time_'+s.id) || "--.--.---- | --:--";
            const status = localStorage.getItem('status_'+s.id) || "waiting";
            
            if(status === 'done') done++;

            body.innerHTML += `
                <tr>
                    <td style="font-weight:bold; color:var(--primary)">${s.id + 1}</td>
                    <td><b>${s.n}</b><br><small style="color:#64748b">${s.t}</small></td>
                    <td><span style="font-size:13px">${topic}</span><br><small style="color:#94a3b8">${time}</small></td>
                    <td>
                        <select onchange="updateStatus(${s.id}, this.value)" style="border:none; background:#f1f5f9; padding:5px; border-radius:5px; font-size:11px">
                            <option value="waiting" ${status === 'waiting' ? 'selected' : ''}>🟡 Кутилаяпти</option>
                            <option value="done" ${status === 'done' ? 'selected' : ''}>🟢 Ўтилди</option>
                        </select>
                    </td>
                    <td><button class="btn btn-edit" onclick="editSubject(${s.id})">Таҳрир</button></td>
                </tr>`;
        });
        document.getElementById('doneCount').innerText = done;
    }

    function editSubject(id) {
        const pass = prompt("Ушбу фан учун паролни киритинг:");
        if (pass === subjects[id].pass) {
            const val = prompt("Янги мавзуни киритинг:");
            if (val) {
                const now = new Date();
                const fullDate = now.toLocaleDateString() + " | " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                localStorage.setItem('topic_'+id, val.trim());
                localStorage.setItem('time_'+id, fullDate);
                render();
            }
        } else if (pass !== null) alert("Хато пароль!");
    }

    function updateStatus(id, newStatus) {
        const pass = prompt("Ҳолатни ўзгартириш учун ушбу фан паролини киритинг:");
        if (pass === subjects[id].pass) {
            localStorage.setItem('status_'+id, newStatus);
            render();
        } else {
            alert("Хато пароль!");
            render(); // Жадвални қайта чиқариш (селектни қайтариш учун)
        }
    }

    function filterTable() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    // EXPORT EXCEL
    function exportToExcel() {
        const table = document.getElementById("mainTable");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Dars_Jadvali.xlsx");
    }

    // EXPORT PDF
    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dars Jadvali", 14, 15);
        doc.autoTable({ html: '#mainTable', startY: 20 });
        doc.save("Dars_Jadvali.pdf");
    }

    render();
</script>

</body>
</html>
