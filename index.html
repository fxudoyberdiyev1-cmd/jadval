<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнинг Жадвал</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #4F46E5; color: white; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .day { font-weight: bold; color: #4F46E5; width: 30%; }
        .subject { font-weight: 600; color: #333; display: block; }
        .topic { color: #666; font-size: 13px; font-style: italic; display: block; margin-top: 5px; }
        .room { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; float: right; }
        tr:hover { background: #f9faff; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2 style="margin:0;">📅 Дарс Жадвали</h2>
            <p style="margin:5px 0 0; font-size:14px; opacity:0.8;">Курсдошлар учун махсус</p>
        </div>
        <table>
            <tbody>
                <tr>
                    <td class="day">Душанба</td>
                    <td>
                        <span class="room">302</span>
                        <span class="subject">Линейная алгебра</span>
                        <span class="topic">Мавзу: Матрицалар ранги</span>
                    </td>
                </tr>
                <tr>
                    <td class="day">Сешанба</td>
                    <td>
                        <span class="room">405</span>
                        <span class="subject">Инглиз тили</span>
                        <span class="topic">Мавзу: Business Vocabulary</span>
                    </td>
                </tr>
                </tbody>
        </table>
    </div>
</body>
</html>
