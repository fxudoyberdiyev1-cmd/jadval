<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item:hover { background-color: #f1f5f9; color: #2563eb; }
        .active-nav { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; font-weight: 600; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-gray-800">

    <div class="flex min-h-screen">
        <aside class="w-72 bg-white border-r border-gray-200 sticky top-0 h-screen hidden md:block">
            <div class="p-8 text-2xl font-black text-blue-700 tracking-tight">EduManager</div>
            <nav class="space-y-1">
                <div class="sidebar-item active-nav px-8 py-4 cursor-pointer flex items-center gap-3"><span>🏠</span> Bosh sahifa</div>
                <div class="sidebar-item px-8 py-4 cursor-pointer flex items-center gap-3 text-gray-500"><span>📘</span> Darslar</div>
                <div class="sidebar-item px-8 py-4 cursor-pointer flex items-center gap-3 text-gray-500"><span>👨‍🏫</span> Ustozlar</div>
                <div class="sidebar-item px-8 py-4 cursor-pointer flex items-center gap-3 text-gray-500"><span>🎓</span> Talabalar</div>
                <div class="sidebar-item px-8 py-4 cursor-pointer flex items-center gap-3 text-gray-500"><span>📅</span> Jadval</div>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Darslar</h1>
                    <p class="text-gray-500">Barcha fanlar va darslarni boshqarish</p>
                </div>
                <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold shadow-lg shadow-blue-200 transition">+ Yangi dars qo'shish</button>
            </div>

            <div id="lessonsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Yangi dars ma'lumotlari</h2>
            <div class="space-y-4">
                <input id="f_title" type="text" placeholder="Fan nomi" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="f_teacher" type="text" placeholder="Ustoz ismi" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="f_date" type="date" class="p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none">
                    <input id="f_time" type="time" class="p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none">
                </div>
                <input id="f_room" type="text" placeholder="Xona (м-н: 101-xona)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="toggleModal()" class="flex-1 py-4 text-gray-500 font-semibold">Bekor qilish</button>
                <button onclick="addLesson()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700">Tasdiqlash</button>
            </div>
        </div>
    </div>

    <script>
        // Дастлабки маълумотлар
        let lessons = [
            { title: "Iqtisodiyot nazariyasi 2", teacher: "B. Karimov", date: "2026-04-24", time: "20:52", room: "101-xona", status: "Active" },
            { title: "Xorijiy til 2", teacher: "A. Rahimova", date: "2026-04-24", time: "20:25", room: "202-xona", status: "Active" }
        ];

        function renderLessons() {
            const container = document.getElementById('lessonsContainer');
            container.innerHTML = '';
            lessons.forEach((item, index) => {
                container.innerHTML += `
                    <div class="bg-white p-7 rounded-[32px] card-shadow border border-gray-50 relative group">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl font-bold">
                                ${item.title.charAt(0)}
                            </div>
                            <span class="bg-green-100 text-green-700 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-wider">${item.status}</span>
                        </div>
                        <h3 class="text-xl font-extrabold text-gray-900 mb-1">${item.title}</h3>
                        <p class="text-blue-500 font-medium text-sm mb-6">👤 ${item.teacher}</p>
                        
                        <div class="grid grid-cols-2 gap-y-3 text-sm text-gray-500 border-t pt-6">
                            <p class="flex items-center gap-2">📅 ${item.date}</p>
                            <p class="flex items-center gap-2">⏰ ${item.time}</p>
                            <p class="flex items-center gap-2 font-semibold text-gray-700">📍 ${item.room}</p>
                        </div>
                        
                        <div class="mt-8 flex gap-2">
                            <button class="flex-1 py-3 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold hover:bg-blue-100 transition">Yangilash</button>
                            <button onclick="deleteLesson(${index})" class="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition text-xs">🗑</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.classList.toggle('hidden');
        }

        function addLesson() {
            const title = document.getElementById('f_title').value;
            const teacher = document.getElementById('f_teacher').value;
            const date = document.getElementById('f_date').value;
            const time = document.getElementById('f_time').value;
            const room = document.getElementById('f_room').value;

            if(title && teacher) {
                lessons.push({ title, teacher, date, time, room, status: "Active" });
                renderLessons();
                toggleModal();
                // Формани тозалаш
                document.querySelectorAll('input').forEach(i => i.value = '');
            } else {
                alert("Iltimos, asosiy maydonlarni to'ldiring!");
            }
        }

        function deleteLesson(index) {
            if(confirm("Darsni o'chirmoqchimisiz?")) {
                lessons.splice(index, 1);
                renderLessons();
            }
        }

        // Саҳифа юкланганда дарсларни чиқариш
        renderLessons();
    </script>
</body>
</html>
