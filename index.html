<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Jadval Pro</title>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --bg: rgba(255, 255, 255, 0.95); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1950&q=80');
            background-size: cover; background-attachment: fixed; margin: 0; padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Календарь ва Жонли Вақт */
        .header-section {
            background: var(--bg); padding: 25px; border-radius: 25px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .cal-big { font-size: 50px; font-weight: 900; color: var(--primary); line-height: 1; }
        .time-big { font-size: 45px; font-weight: 900; color: var(--dark); }

        /* Жадвал Дизайни */
        .table-card { background: var(--bg); border-radius: 25px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 20px; text-align: left; font-size: 14px; color: #475569; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 25px; border-bottom: 2px solid #f1f5f9; }

        /* Ёзувларни кўзга ташланадиган қилиш */
        .subject-name { font-size: 20px; font-weight: 900; color: var(--dark); display: block; margin-bottom: 5px; }
        .teacher-box { 
            display: inline-block; background: #f1f5f9; color: #475569; 
            padding: 5px 12px; border-radius: 8px; font-weight: 700; font-size: 14px; border: 1px solid #e2e8f0;
        }
        .current-topic { 
            font-size: 18px; font-weight: 700; color: #1e293b; background: #fff; 
            padding: 15px; border-radius: 12px; border-left: 6px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: block;
        }
        .date-badge { font-size: 12px; font-weight: 800; color: var(--primary); margin-top: 10px; display: block; }

        /* Архив Модал */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: white; margin: 2% auto; padding: 30px; border-radius: 30px; width: 70%; max-height: 90vh; overflow-y: auto; }
        .history-item { 
            padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; 
            font-size: 16px; font-weight: 600;
        }

        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .btn-edit { background: var(--primary); color: white; margin-bottom: 10px; width: 100%; }
        .btn-history { background: #1e293b; color: white; width: 100%; }
        .btn-edit:hover, .btn-history:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div>
            <span id="monthName" style="font-weight: 800; color: #64748b; letter-spacing: 2px;"></span>
            <div class="cal-big" id="dayNum"></div>
            <span id="weekDay" style="font-weight: 800; color: #64748b;"></span>
        </div>
        <div class="time-big" id="liveTime"></div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">№</th>
                    <th style="width: 300px;">Фан ва Ўқитувчи</th>
                    <th>Жорий Мавзу</th>
                    <th style="width: 150px;">Бошқарув</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #f1f5f9; padding-bottom:15px;">
            <h2 id="historyTitle" style="margin:0; color:var(--primary); font-size: 24px;">Мавзулар Архиди</h2>
            <button onclick="closeHistory()" class="btn" style="background:#ef4444; color:white;">Ёпиш</button>
        </div>
        <div id="historyList" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const subjects = [
        { id: 0, n: "Iqtisodiyot nazariyasi 2", t: "S. Karimov", pass: "1111" },
        { id: 1, n: "Xorijiy til 2", t: "A. Rahimova", pass: "2222" },
        { id: 2, n: "O‘zbek (rus) tili", t: "M. G'afforov", pass: "3333" },
        { id: 3, n: "Dinshunoslik", t: "N. Olimov", pass: "4444" },
        { id: 4, n: "Jismoniy madaniyat", t: "V. Ivanov", pass: "5555" },
        { id: 5, n: "Akademik ko‘nikmalar", t: "D. Zokirova", pass: "6666" },
        { id: 6, n: "Amaliy matematika 2", t: "P. Qosimov", pass: "7777" }
    ];

    function render() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';

        subjects.forEach((s) => {
            const history = JSON.parse(localStorage.getItem('h40_'+s.id)) || [];
            const last = history[0] || { topic: "Мавзу киритилмаган", date: "--.--.----", time: "--:--" };

            body.innerHTML += `
                <tr>
                    <td style="font-size: 24px; font-weight: 900; color: var(--primary); text-align: center;">${s.id + 1}</td>
                    <td>
                        <span class="subject-name">${s.n}</span>
                        <div class="teacher-box">👤 ${s.t}</div>
                    </td>
                    <td>
                        <span class="current-topic">${last.topic}</span>
                        <span class="date-badge">📅 КИРИТИЛДИ: ${last.date} | 🕒 ${last.time}</span>
                    </td>
                    <td>
                        <button class="btn btn-edit" onclick="editSubject(${s.id})">ЎЗГАРТИРИШ</button>
                        <button class="btn btn-history" onclick="showHistory(${s.id})">АРХИВ (40)</button>
                    </td>
                </tr>`;
        });
    }

    function editSubject(id) {
        if (prompt("Ушбу фан паролини киритинг:") === subjects[id].pass) {
            const val = prompt("Янги дарс мавзусини киритинг:");
            if (val) {
                const now = new Date();
                const entry = {
                    topic: val.trim(),
                    date: now.toLocaleDateString('uz-UZ'),
                    time: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0')
                };

                let history = JSON.parse(localStorage.getItem('h40_'+id)) || [];
                history.unshift(entry);
                if (history.length > 40) history.pop(); // 40 ТА МАВЗУ ЧЕГАРАСИ

                localStorage.setItem('h40_'+id, JSON.stringify(history));
                render();
            }
        } else { alert("Хато пароль!"); }
    }

    function showHistory(id) {
        const history = JSON.parse(localStorage.getItem('h40_'+id)) || [];
        const list = document.getElementById('historyList');
        document.getElementById('historyTitle').innerText = subjects[id].n + " — Мавзулар тарихи";
        list.innerHTML = '';
        
        history.forEach((h, index) => {
            list.innerHTML += `
                <div class="history-item">
                    <span style="color:var(--dark)"><b>${index + 1}.</b> ${h.topic}</span>
                    <span style="color:var(--primary); font-size:14px;">${h.date} | ${h.time}</span>
                </div>`;
        });
        if(!history.length) list.innerHTML = "<center>Архив бўш</center>";
        document.getElementById('historyModal').style.display = 'block';
    }

    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    function updateTime() {
        const now = new Date();
        document.getElementById('dayNum').innerText = now.getDate();
        document.getElementById('monthName').innerText = now.toLocaleDateString('uz-UZ', {month: 'long'}).toUpperCase();
        document.getElementById('weekDay').innerText = now.toLocaleDateString('uz-UZ', {weekday: 'long'}).toUpperCase();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }

    setInterval(updateTime, 1000);
    updateTime();
    render();
</script>
</body>
</html>
