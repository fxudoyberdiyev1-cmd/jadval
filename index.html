<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактив Жадвал</title>
    <style>
        :root { --primary: #4f46e5; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .editable-date { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .tr-col { width: 30px; font-weight: bold; color: var(--primary); text-align: center; }
        .subject { font-weight: 600; display: block; color: var(--dark); }
        .topic { font-size: 13px; color: #64748b; font-style: italic; cursor: pointer; display: block; }
        .topic:hover { color: var(--primary); background: #f8fafc; }
        input { width: 90%; padding: 5px; border: 2px solid var(--primary); border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span class="editable-date" id="mainDate" onclick="editDate()">САНАНИ ЎЗГАРТИРИШ</span>
        <h2 style="margin:10px 0 0 0;">📓 ДАРС ЖАДВАЛИ</h2>
    </div>
    <table>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const subjs = ["Iqtisodiyot nazariyasi 2", "Xorijiy til 2", "O‘zbek (rus) tili", "Dinshunoslik", "Jismoniy madaniyat", "Akademik ko‘nikmalar", "Amaliy matematika 2"];

    function render() {
        const date = localStorage.getItem('myDate') || "24-АПРЕЛЬ, 2026";
        document.getElementById('mainDate').innerText = date;

        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        subjs.forEach((s, i) => {
            const t = localStorage.getItem('t_'+i) || "Мавзуни ёзиш учун босинг...";
            body.innerHTML += `<tr><td class="tr-col">${i+1}</td><td><span class="subject">${s}</span><span class="topic" onclick="editTopic(${i})">${t}</span></td></tr>`;
        });
    }

    function editDate() {
        const old = document.getElementById('mainDate').innerText;
        const val = prompt("Янги санани ёзинг:", old);
        if(val) { localStorage.setItem('myDate', val); render(); }
    }

    function editTopic(i) {
        const val = prompt("Мавзуни ўзгартиринг:");
        if(val) { localStorage.setItem('t_'+i, val); render(); }
    }

    render();
</script>
</body>
</html>
