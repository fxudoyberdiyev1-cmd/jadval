<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON - Тизим v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --main-bg: #0b0f19; --sidebar-bg: #111827; --card-bg: rgba(31, 41, 55, 0.6); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--main-bg); color: #e2e8f0; min-height: 100vh; display: flex; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        aside { background-color: var(--sidebar-bg); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; transition: 0.3s; }
        .nav-item { padding: 1.2rem; margin: 0.5rem 0; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 1rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); border-left: 4px solid var(--accent); }
        .time-box { background: #1f2937; border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 20px; padding: 12px 30px; display: flex; gap: 40px; align-items: center; }
        input { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; padding: 14px; border-radius: 14px; width: 100%; outline: none; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="w-72 h-screen sticky top-0 p-8 flex flex-col">
        <div class="mb-12 text-center">
            <h1 class="orbitron text-3xl font-black tracking-widest text-white">SARBON</h1>
            <p class="text-[9px] text-cyan-400 font-bold tracking-[5px] uppercase mt-1">Universiteti</p>
        </div>
        <nav class="flex-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-item active">📡 Boshqaruv</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-item">🌀 Haftalik Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-item">⚡ Yangi Qo'shish</div>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-10">
            <h2 id="page-title" class="text-4xl font-black uppercase italic text-white tracking-tighter">Asosiy Oyna</h2>
            <div class="time-box">
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Sana</p>
                    <p id="live-date" class="orbitron text-xl font-bold text-white tracking-tighter">--.--.----</p>
                </div>
                <div class="w-[1px] h-8 bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Vaqt</p>
                    <p id="live-time" class="orbitron text-xl font-bold text-cyan-400 tracking-tighter">00:00</p>
                </div>
            </div>
        </header>

        <div id="dashboard" class="page active">
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-8"></div>
        </div>

        <div id="weekly" class="page">
            <div class="grid grid-cols-7 gap-3" id="weekly-grid"></div>
        </div>

        <div id="add" class="page">
            <div class="max-w-2xl mx-auto glass-card p-12">
                <h4 class="text-2xl font-black uppercase italic mb-10 text-white border-l-4 border-cyan-500 pl-4">Yangi dars qo'shish</h4>
                <div class="space-y-6">
                    <input id="in-ifsh" type="text" placeholder="O'qituvchi F.I.Sh">
                    <input id="in-fan" type="text" placeholder="Fan nomi">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="in-sana" type="date">
                        <input id="in-image" type="file" accept="image/*">
                    </div>
                    <button onclick="saveAll()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl uppercase tracking-widest transition-all">Saqlash</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_final_v5')) || [];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('uz-UZ');
            document.getElementById('live-time').innerText = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'dashboard') renderDashboard();
            if(id === 'weekly') renderWeekly();
        }

        async function saveAll() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgFile = document.getElementById('in-image').files[0];

            if(!ifsh || !fan || !sana) return alert("To'ldiring!");

            let img = "";
            if(imgFile) {
                img = await new Promise(r => {
                    const fr = new FileReader(); fr.readAsDataURL(imgFile);
                    fr.onload = () => r(fr.result);
                });
            }

            const dObj = new Date(sana);
            let dNum = dObj.getDay(); if(dNum === 0) dNum = 7;

            db.push({ id: Date.now(), ifsh, fan, sana, img, day: dNum, vaqt: new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' }) });
            localStorage.setItem('sarbon_final_v5', JSON.stringify(db));
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-card p-6 flex items-center gap-6">
                    <div class="w-24 h-24 rounded-2xl bg-white flex items-center justify-center overflow-hidden flex-shrink-0 shadow-lg">
                        ${t.img ? 
                            `<img src="${t.img}" class="w-full h-full object-cover">` : 
                            `<img src="https://i.ibb.co/F4pYf6T/sarbon-logo.png" class="w-[85%] h-auto">`
                        }
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-start">
                            <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest truncate">${t.ifsh}</p>
                            <button onclick="deleteItem(${t.id})" class="text-[9px] font-bold text-red-500 uppercase hover:underline">O'chirish</button>
                        </div>
                        <h4 class="text-2xl font-black text-white italic uppercase truncate">${t.fan}</h4>
                        <div class="flex gap-4 text-[10px] font-bold text-gray-500 border-t border-white/5 mt-3 pt-2">
                            <span>${t.sana}</span>
                            <span class="text-cyan-400">${t.vaqt}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderWeekly() {
            const days = ['Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba', 'Yakshanba'];
            document.getElementById('weekly-grid').innerHTML = days.map((day, i) => `
                <div class="flex flex-col gap-3">
                    <div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">${day}</div>
                    <div class="space-y-2">
                        ${db.filter(t => t.day === (i + 1)).map(t => `
                            <div class="p-3 bg-white/5 rounded-xl border-l-2 border-cyan-500">
                                <p class="text-[9px] font-black text-white uppercase truncate">${t.fan}</p>
                                <p class="text-[8px] text-gray-500 mt-1">${t.vaqt}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            db = db.filter(t => t.id !== id);
            localStorage.setItem('sarbon_final_v5', JSON.stringify(db));
            renderDashboard();
        }

        renderDashboard();
    </script>
</body>
</html>
