<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager - Sarbon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --main-bg: #0b0f19; --sidebar-bg: #111827; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--main-bg); color: #e2e8f0; display: flex; margin: 0; }
        aside { background-color: var(--sidebar-bg); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(31, 41, 55, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .nav-item { padding: 1rem 1.5rem; margin: 0.5rem 0; border-radius: 15px; cursor: pointer; transition: 0.3s; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); border-left: 4px solid var(--accent); }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="w-72 h-screen sticky top-0 flex flex-col shadow-2xl">
        <div class="p-8 text-left border-b border-white/5">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 inline-block mb-4">
                <img src="photo_2025-02-07_09-59-36.jpg" alt="Logo" class="w-16 h-auto">
            </div>
            <h1 class="text-lg font-black text-white tracking-tighter uppercase orbitron">EduManager</h1>
            <p class="text-[8px] text-cyan-400 font-bold tracking-[3px] uppercase mt-1">Sarbon Universiteti</p>
        </div>

        <nav class="flex-1 px-6 pt-6">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-item active">📡 Boshqaruv</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-item">🌀 Haftalik Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-item">⚡ Yangi Qo'shish</div>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-10">
            <h2 id="page-title" class="text-4xl font-black uppercase italic text-white tracking-tighter">Asosiy Oyna</h2>
            <div class="bg-[#1f2937] px-6 py-3 rounded-2xl border border-white/10 flex gap-8 items-center">
                <div class="text-center">
                    <p class="text-[8px] text-gray-500 font-black uppercase">Sana</p>
                    <p id="live-date" class="orbitron text-lg font-bold text-white tracking-tighter">--.--.----</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] text-gray-500 font-black uppercase">Vaqt</p>
                    <p id="live-time" class="orbitron text-lg font-bold text-cyan-400 tracking-tighter">00:00</p>
                </div>
            </div>
        </header>

        <div id="dashboard" class="page active">
            <h3 class="text-white font-bold mb-6 opacity-50 uppercase text-xs tracking-widest">O'qituvchilar ro'yxati</h3>
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
        </div>

        <div id="weekly" class="page">
            <div class="grid grid-cols-7 gap-3" id="weekly-grid"></div>
        </div>

        <div id="add" class="page">
            <div class="max-w-xl glass-card p-10">
                <h4 class="text-xl font-black text-white uppercase mb-8 border-l-4 border-cyan-500 pl-4">Dars qo'shish</h4>
                <div class="space-y-4">
                    <input id="in-ifsh" class="w-full bg-black/30 border border-white/10 p-4 rounded-xl text-white outline-none" type="text" placeholder="F.I.Sh">
                    <input id="in-fan" class="w-full bg-black/30 border border-white/10 p-4 rounded-xl text-white outline-none" type="text" placeholder="Fan nomi">
                    <input id="in-sana" class="w-full bg-black/30 border border-white/10 p-4 rounded-xl text-white outline-none" type="date">
                    <input id="in-image" class="w-full text-xs text-gray-500" type="file" accept="image/*">
                    <button onclick="saveAll()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-all mt-4">Saqlash</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_clean_v8')) || [];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('uz-UZ');
            document.getElementById('live-time').innerText = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'dashboard') renderDashboard();
            if(id === 'weekly') renderWeekly();
        }

        async function saveAll() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgFile = document.getElementById('in-image').files[0];
            if(!ifsh || !fan || !sana) return alert("To'ldiring!");

            let img = "";
            if(imgFile) {
                img = await new Promise(r => {
                    const fr = new FileReader(); fr.readAsDataURL(imgFile);
                    fr.onload = () => r(fr.result);
                });
            }

            const dObj = new Date(sana);
            let dNum = dObj.getDay(); if(dNum === 0) dNum = 7;

            db.push({ id: Date.now(), ifsh, fan, sana, img, day: dNum, vaqt: new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' }) });
            localStorage.setItem('sarbon_clean_v8', JSON.stringify(db));
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-card p-6 flex items-center gap-6 border-white/5 hover:border-cyan-500/20 transition-all">
                    <div class="w-20 h-20 rounded-2xl bg-white/5 flex items-center justify-center overflow-hidden flex-shrink-0 border border-white/10">
                        ${t.img ? `<img src="${t.img}" class="w-full h-full object-cover">` : `<div class="text-cyan-500 font-black text-2xl">${t.fan[0]}</div>`}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-start">
                            <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest truncate">${t.ifsh}</p>
                            <button onclick="deleteItem(${t.id})" class="text-red-500 text-[8px] font-bold uppercase hover:underline">O'chirish</button>
                        </div>
                        <h4 class="text-xl font-black text-white italic uppercase truncate leading-tight">${t.fan}</h4>
                        <div class="flex gap-4 text-[9px] font-bold text-gray-500 border-t border-white/5 mt-3 pt-2">
                            <span>${t.sana}</span>
                            <span class="text-cyan-400/60">${t.vaqt}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderWeekly() {
            const days = ['Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba', 'Yakshanba'];
            document.getElementById('weekly-grid').innerHTML = days.map((day, i) => `
                <div class="flex flex-col gap-3">
                    <div class="glass-card p-2 text-center text-[9px] font-black text-cyan-500 uppercase border-cyan-500/20">${day}</div>
                    <div class="space-y-2">
                        ${db.filter(t => t.day === (i + 1)).map(t => `
                            <div class="p-3 bg-white/5 rounded-xl border-l-2 border-cyan-500">
                                <p class="text-[8px] font-black text-white uppercase truncate">${t.fan}</p>
                                <p class="text-[7px] text-gray-500 mt-1">${t.vaqt}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            db = db.filter(t => t.id !== id);
            localStorage.setItem('sarbon_clean_v8', JSON.stringify(db));
            renderDashboard();
        }

        renderDashboard();
    </script>
</body>
</html>
