<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sarbon Universiteti Logo</title>
    <style>
        :root {
            --dark-blue: #2c4765;
            --dark-red: #7a2b2d;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Логотипнинг график қисми */
        .icon {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 15px;
        }

        /* Катта тўртбурчак (кесилган) */
        .big-shape {
            position: absolute;
            top: 0;
            right: 0;
            width: 170px;
            height: 170px;
            background-color: var(--dark-blue);
            border-bottom-left-radius: 100%; /* Камонсимон кесилиш */
        }

        /* Кичик шакл (пастдаги) */
        .small-shape {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 80px;
            background-color: var(--dark-blue);
            border-top-right-radius: 100%;
        }

        /* Матн қисми */
        .text-container {
            text-align: center;
            color: var(--dark-red);
            line-height: 1.1;
        }

        .line1 {
            font-size: 42px;
            font-weight: bold;
            display: block;
        }

        .line2 {
            font-size: 36px;
            font-weight: bold;
            display: block;
            position: relative;
        }

        .registered {
            font-size: 14px;
            position: absolute;
            top: 5px;
            right: -20px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="icon">
            <div class="big-shape"></div>
            <div class="small-shape"></div>
        </div>
        
        <div class="text-container">
            <span class="line1">Sarbon</span>
            <span class="line2">Universiteti<span class="registered">®</span></span>
        </div>
    </div>

</body>
</html>
