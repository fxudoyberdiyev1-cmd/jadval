<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактив Кундалик v4</title>
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 900px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .editable-date { background: var(--primary); padding: 5px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; color: #334155; }
        
        .tr-col { width: 40px; font-weight: bold; color: var(--primary); text-align: center; background: #f8fafc; }
        .subject-col { font-weight: 600; color: var(--dark); width: 25%; }
        
        .editable-cell { 
            display: block; 
            padding: 8px; 
            background: #f9fafb; 
            border-radius: 6px; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: 0.2s;
            min-height: 20px;
        }
        .editable-cell:hover { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        .footer { text-align: center; padding: 15px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span class="editable-date" id="topDate" onclick="changeField('topDate')">САНАНИ КИРИТИНГ</span>
        <h2 style="margin:10px 0 0 0;">📓 ТАҲРИРЛАНУВЧИ ДАРС ЖАДВАЛИ</h2>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Т/Р</th>
                    <th>Фан номи</th>
                    <th>Дарс мавзуси</th>
                    <th>Устоз (И.Ф.О.)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="footer">Ўзгартириш учун катаклар устига бир марта босинг.</div>
</div>

<script>
    const subjects = [
        "Iqtisodiyot nazariyasi 2",
        "Xorijiy til 2",
        "O‘zbek (rus) tili",
        "Dinshunoslik",
        "Jismoniy madaniyat",
        "Akademik ko‘nikmalar",
        "Amaliy matematika 2"
    ];

    function render() {
        document.getElementById('topDate').innerText = localStorage.getItem('topDate') || "24-APREL, 2026";
        const body = document.getElementById('tableBody');
        body.innerHTML = '';

        subjects.forEach((s, i) => {
            const topic = localStorage.getItem('t_'+i) || "Мавзу...";
            const teacher = localStorage.getItem('teach_'+i) || "Устоз исми...";

            body.innerHTML += `
                <tr>
                    <td class="tr-col">${i + 1}</td>
                    <td class="subject-col">${s}</td>
                    <td><span class="editable-cell" onclick="changeField('t_${i}')">${topic}</span></td>
                    <td><span class="editable-cell" onclick="changeField('teach_${i}')">${teacher}</span></td>
                </tr>`;
        });
    }

    function changeField(key) {
        const current = localStorage.getItem(key) || "";
        const next = prompt("Янги маълумотни киритинг:", current);
        if (next !== null) {
            localStorage.setItem(key, next.trim() || "...");
            render();
        }
    }

    render();
</script>

</body>
</html>
