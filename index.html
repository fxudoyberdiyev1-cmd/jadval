<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON UNIVERSITY | Portal v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-cyan: #00f2ff; 
            --bg-body: radial-gradient(circle at top right, #0d1621, #080a0c);
            --text-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.02);
            --aside-bg: rgba(13, 18, 23, 0.9);
        }

        .light-mode {
            --bg-body: radial-gradient(circle at top right, #f0f4f8, #d9e2ec);
            --text-color: #0f172a;
            --panel-bg: rgba(0, 0, 0, 0.05);
            --aside-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-body);
            color: var(--text-color); 
            min-height: 100vh; 
            margin: 0; 
            display: flex;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        #login-screen {
            position: fixed; inset: 0; z-index: 999;
            background: #080a0c; display: flex; align-items: center; justify-content: center;
        }

        aside { 
            width: 300px; background: var(--aside-bg);
            backdrop-filter: blur(25px); border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; padding: 2rem 1.2rem;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 18px; margin-bottom: 6px;
            border-radius: 16px; color: #94a3b8;
            font-weight: 500; cursor: pointer; transition: 0.3s;
        }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(44, 71, 101, 0.4), rgba(0, 242, 255, 0.1));
            color: var(--accent-cyan); border: 1px solid rgba(0, 242, 255, 0.2);
        }

        main { flex: 1; padding: 3rem; overflow-y: auto; }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
        }
    </style>
</head>
<body id="body-tag">

    <div id="login-screen">
        <div class="glass-panel p-10 w-96 text-center border border-white/10" style="background: rgba(255,255,255,0.03)">
            <div class="mb-6 flex justify-center">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl">
                    <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
                </div>
            </div>
            <h2 class="text-2xl font-black text-white mb-2 uppercase italic">Sarbon Portal</h2>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-[3px]">Авторизация</p>
            
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Логин" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500 transition-all">
                <input id="login-pass" type="password" placeholder="Пароль" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-cyan-500 transition-all">
                <button onclick="checkLogin()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-white uppercase tracking-widest hover:bg-blue-500 active:scale-95 transition-all shadow-lg shadow-blue-600/20">Кириш</button>
            </div>
            <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden uppercase font-bold tracking-widest">Логин ёки парол хато!</p>
        </div>
    </div>

    <aside id="sidebar" style="display: none;">
        <div class="logo-wrapper mb-12 text-center flex flex-col items-center">
            <div class="w-12 h-12 bg-blue-600 rounded-xl mb-3"></div>
            <h1 class="text-xl font-black italic text-white uppercase">Sarbon</h1>
            <p class="text-[8px] font-bold tracking-[4px] uppercase text-cyan-400">Universiteti</p>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active">
                <i data-lucide="layout-dashboard"></i> Boshqaruv
            </div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-link">
                <i data-lucide="calendar-range"></i> Jadval
            </div>
            <div onclick="showPage('add')" id="nav-add" class="nav-link">
                <i data-lucide="plus-circle"></i> Qo'shish
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5 space-y-4">
            <div class="flex items-center gap-3 p-3 rounded-2xl bg-white/5 border border-white/5">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center font-bold text-white">AD</div>
                <div class="flex-1">
                    <p class="text-[10px] font-black text-white uppercase">Admin</p>
                    <p class="text-[8px] text-gray-500 uppercase">Super User</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="toggleTheme()" class="flex items-center justify-center gap-2 p-3 rounded-xl bg-white/5 hover:bg-white/10 text-[9px] font-bold uppercase transition-all">
                    <i data-lucide="sun-moon" class="w-3.5 h-3.5"></i> Режим
                </button>
                <button onclick="location.reload()" class="flex items-center justify-center gap-2 p-3 rounded-xl bg-red-500/10 text-red-400 text-[9px] font-bold uppercase transition-all">
                    <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Чиқиш
                </button>
            </div>
        </div>
    </aside>

    <main id="main-content" style="display: none;">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 id="page-title" class="text-5xl font-black italic text-white uppercase tracking-tighter">Boshqaruv</h2>
                <div class="h-1.5 w-20 bg-cyan-500 mt-2 rounded-full"></div>
            </div>
            <div class="bg-black/20 p-4 rounded-[24px] border border-white/5 flex gap-6 items-center backdrop-blur-md">
                <div class="text-right">
                    <p id="live-time" class="text-2xl font-black text-cyan-400 leading-none">00:00</p>
                    <p id="live-date" class="text-[10px] font-bold text-gray-500 uppercase mt-1">-- -- --</p>
                </div>
                <i data-lucide="clock" class="text-gray-600"></i>
            </div>
        </header>

        <div id="dashboard" class="page-content">
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
        </div>

        <div id="weekly" class="page-content" style="display: none;">
            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-7 gap-4">
                <div class="space-y-3">
                    <div class="bg-blue-600 p-4 rounded-2xl text-center shadow-lg"><span class="text-[10px] font-black text-white uppercase">Dushanba</span></div>
                    <div class="bg-[#78b3f4] p-6 rounded-[28px] text-black shadow-xl">
                        <h5 class="font-black text-xl">Iqtisodiyot</h5>
                        <p class="opacity-60 text-[11px] font-bold mt-2 uppercase italic tracking-widest">09:00 - 10:20</p>
                    </div>
                </div>
                </div>
        </div>

        <div id="add" class="page-content" style="display: none;">
            <div class="max-w-xl mx-auto glass-panel p-10 border border-white/5">
                <h3 class="text-2xl font-black mb-8 uppercase italic text-white">Янги маълумот</h3>
                <div class="space-y-4">
                    <input id="in-ifsh" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-500" placeholder="F.I.Sh">
                    <input id="in-fan" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-500" placeholder="Fan nomi">
                    <button onclick="saveData()" class="w-full bg-cyan-500 p-4 rounded-2xl font-black uppercase text-black hover:bg-cyan-400 transition-all">Сақлаш</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // AUTH
        function checkLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            
            if(u === "admin" && p === "sarbon2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main-content').style.display = 'block';
                lucide.createIcons();
                renderDashboard();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                err.classList.add('animate-bounce');
            }
        }

        // THEME
        function toggleTheme() {
            document.getElementById('body-tag').classList.toggle('light-mode');
        }

        // TIME
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-date').innerText = now.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();

        // PAGES
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(id).style.display = 'block';
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = (id === 'weekly' ? 'Jadval' : (id === 'add' ? 'Qo\'shish' : 'Boshqaruv'));
            if(id === 'dashboard') renderDashboard();
        }

        // DATA
        let db = JSON.parse(localStorage.getItem('sarbon_db')) || [];
        function saveData() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            if(!ifsh || !fan) return alert("Тўлдиринг!");
            db.push({ id: Date.now(), ifsh, fan, sana: new Date().toLocaleDateString() });
            localStorage.setItem('sarbon_db', JSON.stringify(db));
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-panel p-6 flex items-center gap-6 group hover:border-cyan-500/50 transition-all">
                    <div class="w-14 h-14 rounded-2xl bg-blue-600/20 flex items-center justify-center text-blue-400">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <span class="text-[9px] font-black uppercase text-cyan-400 bg-cyan-500/10 px-2 py-0.5 rounded-full">${t.ifsh}</span>
                        <h4 class="text-xl font-black mt-1 uppercase italic text-white">${t.fan}</h4>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Иконаларни юклаш
        lucide.createIcons();
    </script>
</body>
</html>
