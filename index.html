<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarbon EduManager - Photo Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-item:hover, .active-nav { background-color: #f1f5f9; color: #2D4363; font-weight: 800; border-right: 4px solid #7A2E32; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Sarbon Logo CSS */
        .sarbon-logo-shape-big { width: 50px; height: 50px; background-color: #2D4363; border-bottom-left-radius: 100%; }
        .sarbon-logo-shape-small { width: 18px; height: 18px; background-color: #2D4363; border-top-right-radius: 100%; position: absolute; bottom: 0; left: 0; }
        
        .lesson-card-img { width: 100%; height: 180px; object-fit: cover; border-radius: 24px; }
        .calendar-day.has-data { background-color: #fee2e2; border: 2px solid #7A2E32; color: #7A2E32; font-weight: bold; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-100 sticky top-0 h-screen flex flex-col shadow-sm">
            <div class="p-8 flex flex-col items-center">
                <div class="relative w-[60px] h-[60px] mb-3">
                    <div class="sarbon-logo-shape-big ml-auto"></div>
                    <div class="sarbon-logo-shape-small"></div>
                </div>
                <div class="text-center">
                    <span class="block text-lg font-extrabold tracking-tighter text-[#7A2E32]">Sarbon</span>
                    <span class="block text-lg font-extrabold tracking-tighter text-[#7A2E32]">Universiteti</span>
                </div>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <div onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-item active-nav px-6 py-4 cursor-pointer flex items-center gap-3 rounded-xl transition">🏠 Bosh sahifa</div>
                <div onclick="showPage('jadval')" id="nav-jadval" class="sidebar-item px-6 py-4 cursor-pointer flex items-center gap-3 rounded-xl transition">📅 Tarix</div>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <div class="flex justify-between items-center mb-10">
                <h2 id="page-title" class="text-3xl font-black text-[#2D4363]">Dashboard</h2>
                <div class="flex items-center gap-4 bg-white p-2 pr-6 rounded-full shadow-sm border">
                    <img src="https://avatar.iran.liara.run/public/job/teacher/male" class="w-10 h-10 rounded-full border-2 border-[#7A2E32]">
                    <span class="text-sm font-bold text-gray-700">Admin Panel</span>
                </div>
            </div>

            <div id="dashboard" class="page active">
                <div class="bg-white p-8 rounded-[35px] shadow-sm border border-gray-100 mb-10">
                    <h3 class="text-sm font-black mb-6 text-gray-400 uppercase tracking-widest">Yangi dars ва расм қўшиш</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-bold text-blue-900 ml-2 uppercase">Fan nomi</label>
                            <input id="in-fan" type="text" placeholder="Масалан: Информатика" class="p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#7A2E32] font-semibold">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-bold text-blue-900 ml-2 uppercase">Sana</label>
                            <input id="in-sana" type="date" class="p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#7A2E32] font-semibold">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-bold text-blue-900 ml-2 uppercase">Dars rasmi</label>
                            <input id="in-image" type="file" accept="image/*" class="text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-red-50 file:text-[#7A2E32] hover:file:bg-red-100">
                        </div>
                        <button onclick="saveData()" class="h-[58px] bg-[#2D4363] text-white rounded-2xl font-black hover:bg-[#1a2a3f] shadow-lg shadow-blue-100 transition uppercase text-xs tracking-widest">Saqlash</button>
                    </div>
                </div>

                <div id="lessons-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </div>

            <div id="jadval" class="page">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border">
                    <div class="grid grid-cols-7 gap-3" id="calendar-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_db')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'dashboard') renderDashboard();
            if(id === 'jadval') renderCalendar();
            document.getElementById('page-title').innerText = id === 'dashboard' ? 'Bosh sahifa' : 'Tarix';
        }

        async function saveData() {
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgInput = document.getElementById('in-image');
            const hozirgiVaqt = new Date().toLocaleTimeString('uz-UZ', { hour12: false });

            if(!fan || !sana) return alert("Fan va sanani kiriting!");

            let base64Img = "";
            if(imgInput.files[0]) {
                base64Img = await convertToBase64(imgInput.files[0]);
            }

            db.push({
                id: Date.now(),
                fan: fan,
                sana: sana,
                vaqt: hozirgiVaqt,
                img: base64Img
            });

            localStorage.setItem('sarbon_db', JSON.stringify(db));
            
            // Tozalash
            document.getElementById('in-fan').value = '';
            document.getElementById('in-image').value = '';
            renderDashboard();
        }

        function convertToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        function renderDashboard() {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = db.map(item => `
                <div class="bg-white p-5 rounded-[35px] shadow-sm border border-gray-50 hover:shadow-xl transition-all group">
                    <div class="relative mb-5">
                        ${item.img ? `<img src="${item.img}" class="lesson-card-img shadow-md">` : 
                        `<div class="w-full h-[180px] bg-red-50 rounded-[24px] flex items-center justify-center text-[#7A2E32] font-bold">Rasm yuklanmagan</div>`}
                        <button onclick="deleteItem(${item.id})" class="absolute top-3 right-3 bg-white/80 backdrop-blur text-red-500 w-8 h-8 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition flex items-center justify-center font-bold">×</button>
                    </div>
                    
                    <div class="px-2">
                        <h4 class="text-xl font-black text-[#2D4363] uppercase tracking-tighter mb-4">${item.fan}</h4>
                        
                        <div class="flex items-center justify-between border-t pt-4">
                            <div class="flex items-center gap-2 text-gray-400 font-bold text-[11px]">
                                <span>📅 ${item.sana}</span>
                            </div>
                            <div class="flex items-center gap-2 text-[#7A2E32] font-black text-[11px]">
                                <span>⏰ ${item.vaqt}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            if(confirm("Darsni o'chirmoqchimisiz?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('sarbon_db', JSON.stringify(db));
                renderDashboard();
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const days = ["Du", "Se", "Ch", "Pa", "Ju", "Sh", "Ya"];
            days.forEach(d => grid.innerHTML += `<div class="text-center text-[10px] font-black text-gray-300 uppercase p-2">${d}</div>`);
            
            for(let i=1; i<=31; i++) {
                const dayStr = i.toString().padStart(2, '0');
                const fullDate = `2026-04-${dayStr}`;
                const hasData = db.some(d => d.sana === fullDate);
                grid.innerHTML += `<div class="p-6 border rounded-2xl text-center font-bold ${hasData ? 'has-data shadow-md' : 'text-gray-200'}">${i}</div>`;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
