<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Jadval - Admin Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --admin-gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 10px; }
        
        .app-header {
            background: var(--dark); padding: 20px 15px; border-radius: 0 0 25px 25px;
            color: white; margin: -10px -10px 20px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .time-box { font-size: 28px; font-weight: 800; }

        .card {
            background: white; border-radius: 20px; margin-bottom: 15px;
            padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0; position: relative;
        }
        .num { font-size: 22px; font-weight: 900; color: var(--primary); }
        .subject-title { font-size: 18px; font-weight: 800; color: var(--dark); margin-left: 10px; }
        
        .teacher-name { 
            background: #f8fafc; color: #4338ca; padding: 6px 12px; 
            border-radius: 10px; font-size: 14px; font-weight: 700; margin: 10px 0; display: inline-block;
        }
        
        .topic-area {
            background: #f1f5f9; padding: 15px; border-radius: 15px;
            font-size: 15px; font-weight: 700; color: #1e293b;
            border-left: 5px solid var(--primary); margin: 10px 0;
        }

        .btn-group { display: flex; gap: 8px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px;
            font-weight: 800; font-size: 11px; cursor: pointer;
        }
        .btn-edit { background: var(--primary); color: white; }
        .btn-history { background: #e2e8f0; color: var(--dark); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9999; }
        .modal-content { background: white; margin: 15% auto; width: 85%; border-radius: 25px; padding: 25px; max-height: 70vh; overflow-y: auto; }
        
        .admin-badge {
            position: absolute; top: 15px; right: 15px;
            font-size: 10px; background: var(--admin-gold); color: #000;
            padding: 2px 8px; border-radius: 5px; font-weight: 900;
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="header-top">
        <div>
            <div id="monthName" style="font-size: 12px; color: #94a3b8; font-weight: bold;"></div>
            <div id="liveTime" class="time-box"></div>
        </div>
        <div style="text-align: right;">
            <div id="dayNum" style="font-size: 30px; font-weight: 900;"></div>
            <div id="weekDay" style="font-size: 12px; color: #94a3b8; font-weight: bold;"></div>
        </div>
    </div>
</div>

<div id="mainContainer"></div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h2 id="historyTitle" style="color:var(--primary); margin-top:0; font-size: 20px;"></h2>
        <div id="historyList"></div>
        <button onclick="closeHistory()" class="btn" style="background:var(--dark); color:white; width:100%; margin-top:20px;">ЁПИШ</button>
    </div>
</div>

<script>
    // 1. СУПЕР ПАРОЛЬ (Фақат сиз учун)
    const SUPER_ADMIN_PASSWORD = "admin777";

    // 2. УСТОЗЛАР ВА ФАНЛАР РЎЙХАТИ
    // Бу ерда исмларни ва фанларни бемалол ўзгартиришингиз мумкин
    const subjects = [
        { id: 0, n: "Iqtisodiyot nazariyasi 2", t: "S. Karimov", pass: "1111" },
        { id: 1, n: "Xorijiy til 2", t: "A. Rahimova", pass: "2222" },
        { id: 2, n: "O‘zbek (rus) tili", t: "M. G'afforov", pass: "3333" },
        { id: 3, n: "Dinshunoslik", t: "N. Olimov", pass: "4444" },
        { id: 4, n: "Jismoniy madaniyat", t: "V. Ivanov", pass: "5555" },
        { id: 5, n: "Akademik ko‘nikmalar", t: "D. Zokirova", pass: "6666" },
        { id: 6, n: "Amaliy matematika 2", t: "P. Qosimov", pass: "7777" }
    ];

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function render() {
        const container = document.getElementById('mainContainer');
        container.innerHTML = '';
        subjects.forEach((s) => {
            const history = JSON.parse(localStorage.getItem('h40_'+s.id)) || [];
            const last = history[0] || { topic: "Мавзу киритилмаган", date: "--.--.----", time: "--:--" };
            container.innerHTML += `
                <div class="card">
                    <span class="admin-badge">ADMIN MODE</span>
                    <div style="display:flex; align-items:center;">
                        <span class="num">${s.id + 1}</span>
                        <span class="subject-title">${s.n}</span>
                    </div>
                    <div class="teacher-name">👤 ${s.t}</div>
                    <div class="topic-area">${last.topic}</div>
                    <div style="font-size:11px; color:#64748b; margin-bottom:10px; font-weight:700;">
                        📅 ${last.date} • 🕒 ${last.time}
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-edit" onclick="editSubject(${s.id})">ЎЗГАРТИРИШ</button>
                        <button class="btn btn-history" onclick="showHistory(${s.id})">АРХИВ (40)</button>
                    </div>
                </div>`;
        });
    }

    function editSubject(id) {
        const inputPass = prompt("Фан паролини ёки Супер Паролни киритинг:");
        
        if (inputPass === subjects[id].pass || inputPass === SUPER_ADMIN_PASSWORD) {
            const val = prompt(`${subjects[id].n}\nЯнги мавзуни киритинг:`);
            if (val) {
                const now = new Date();
                const entry = { 
                    topic: val.trim(), 
                    date: now.toLocaleDateString('uz-UZ'), 
                    time: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') 
                };
                let history = JSON.parse(localStorage.getItem('h40_'+id)) || [];
                history.unshift(entry);
                if (history.length > 40) history.pop();
                localStorage.setItem('h40_'+id, JSON.stringify(history));
                render();
            }
        } else { 
            alert("Пароль хато!"); 
        }
    }

    function showHistory(id) {
        const history = JSON.parse(localStorage.getItem('h40_'+id)) || [];
        const list = document.getElementById('historyList');
        document.getElementById('historyTitle').innerText = subjects[id].n + " тарихи";
        list.innerHTML = '';
        history.forEach((h, i) => {
            list.innerHTML += `<div style="padding:12px 0; border-bottom:1px solid #eee;">
                <div style="font-weight:700; color:var(--dark)">${i+1}. ${h.topic}</div>
                <div style="font-size:11px; color:var(--primary); font-weight:800; margin-top:5px;">${h.date} | ${h.time}</div>
            </div>`;
        });
        if(!history.length) list.innerHTML = "<center>Архив бўш</center>";
        document.getElementById('historyModal').style.display = 'block';
    }

    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    function updateTime() {
        const now = new Date();
        document.getElementById('dayNum').innerText = now.getDate();
        document.getElementById('monthName').innerText = now.toLocaleDateString('uz-UZ', {month: 'long'}).toUpperCase();
        document.getElementById('weekDay').innerText = now.toLocaleDateString('uz-UZ', {weekday: 'long'}).toUpperCase();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
    }

    setInterval(updateTime, 1000);
    updateTime();
    render();
</script>
</body>
</html>
