<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт Жадвал v5</title>
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #06b6d4;
            --dark: #1e293b;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--dark);
        }
        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap;
        }
        .app-card {
            flex: 3;
            min-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .sidebar {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: var(--dark);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h2 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        
        .tr-col { width: 40px; font-weight: 800; color: var(--primary); text-align: center; }
        .subject-name { font-weight: 700; color: var(--dark); width: 220px; }
        
        .editable-cell {
            display: block;
            padding: 8px 12px;
            background: #f1f5f9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .editable-cell:hover { background: #e0e7ff; border-color: var(--primary); transform: translateY(-1px); }

        /* Календарь стили */
        .calendar-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .cal-header { color: var(--primary); font-weight: 800; font-size: 18px; margin-bottom: 10px; text-transform: uppercase; }
        .cal-day { font-size: 60px; font-weight: 900; color: var(--dark); line-height: 1; }
        .cal-month { font-size: 20px; color: #64748b; margin-bottom: 10px; }
        .cal-weekday { 
            display: inline-block;
            background: #fee2e2;
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
        }
        .footer-note { margin-top: auto; color: white; font-size: 12px; opacity: 0.8; text-align: center; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .app-card { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="app-card">
        <div class="header">
            <h2>ДАРС ЖАДВАЛИ</h2>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Фан номи</th>
                        <th>Дарс мавзуси</th>
                        <th>Устоз (И.Ф.О.)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="sidebar">
        <div class="calendar-card">
            <div class="cal-header" id="calYear">2026</div>
            <div class="cal-day" id="calDayNumber">24</div>
            <div class="cal-month" id="calMonthName">АПРЕЛЬ</div>
            <div class="cal-weekday" id="calWeekDay">ЖУМА</div>
            <p style="font-size: 11px; color: #94a3b8; margin-top: 15px;">Автоматик календарь</p>
        </div>
        
        <div class="calendar-card" style="background: var(--dark); color: white;">
            <div id="clock" style="font-size: 24px; font-weight: bold;">00:00:00</div>
            <div style="font-size: 11px; opacity: 0.7;">Ҳозирги вақт</div>
        </div>

        <div class="footer-note">Маълумотларни ўзгартириш учун катак устига босинг.</div>
    </div>
</div>

<script>
    const subjects = [
        "Iqtisodiyot nazariyasi 2",
        "Xorijiy til 2",
        "O‘zbek (rus) tili",
        "Dinshunoslik",
        "Jismoniy madaniyat",
        "Akademik ko‘nikmalar",
        "Amaliy matematika 2"
    ];

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        subjects.forEach((s, i) => {
            const topic = localStorage.getItem('t_'+i) || "Мавзу киритилмаган...";
            const teacher = localStorage.getItem('teach_'+i) || "Устоз И.Ф.О...";
            body.innerHTML += `
                <tr>
                    <td class="tr-col">${i + 1}</td>
                    <td class="subject-name">${s}</td>
                    <td><span class="editable-cell" onclick="edit('t_${i}')">${topic}</span></td>
                    <td><span class="editable-cell" onclick="edit('teach_${i}')">${teacher}</span></td>
                </tr>`;
        });
    }

    function edit(key) {
        const old = localStorage.getItem(key) || "";
        const val = prompt("Янги маълумотни киритинг:", old);
        if (val !== null) {
            localStorage.setItem(key, val.trim() || "...");
            renderTable();
        }
    }

    function updateDateTime() {
        const now = new Date();
        
        // Соат
        document.getElementById('clock').innerText = now.toLocaleTimeString('uz-UZ');
        
        // Календарь
        document.getElementById('calDayNumber').innerText = now.getDate();
        document.getElementById('calYear').innerText = now.getFullYear();
        document.getElementById('calMonthName').innerText = now.toLocaleDateString('uz-UZ', {month: 'long'}).toUpperCase();
        document.getElementById('calWeekDay').innerText = now.toLocaleDateString('uz-UZ', {weekday: 'long'}).toUpperCase();
    }

    renderTable();
    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>

</body>
</html>
