<div class="glass-card p-6 flex items-center gap-6 border-white/5 hover:border-cyan-500/40 transition-all">
    <div class="w-24 h-24 rounded-2xl bg-white/5 border border-white/10 overflow-hidden flex-shrink-0 shadow-lg">
        ${t.img ? `<img src="${t.img}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-[10px] text-gray-600">РАСМ</div>`}
    </div>

    <div class="flex-1 flex flex-col justify-center">
        <div class="flex justify-between items-start w-full">
            <p class="text-xs font-black text-cyan-500 uppercase tracking-widest mb-1">${t.ifsh}</p>
            <button onclick="deleteItem(${t.id})" class="text-[9px] font-bold text-red-500 uppercase hover:text-red-400 transition-colors">O'chirish</button>
        </div>
        
        <h4 class="text-2xl font-black text-white italic uppercase leading-none mb-3">${t.fan}</h4>
        
        <div class="flex gap-4 text-[10px] font-bold text-gray-500 border-t border-white/5 pt-2">
            <span>${t.sana}</span>
            <span class="text-cyan-400/70">${t.vaqt}</span>
        </div>
    </div>
</div>
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARBON - Тизим Бошқаруви</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --main-bg: #0b0f19; --sidebar-bg: #111827; --card-bg: rgba(31, 41, 55, 0.6); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--main-bg); color: #e2e8f0; min-height: 100vh; display: flex; margin: 0; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        aside { background-color: var(--sidebar-bg); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .nav-item { padding: 1.2rem; margin: 0.5rem 0; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 1rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--accent); border-left: 4px solid var(--accent); }
        .time-box { background: #1f2937; border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 20px; padding: 12px 30px; display: flex; gap: 40px; align-items: center; }
        input { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; padding: 14px; border-radius: 14px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="w-72 h-screen sticky top-0 p-8 flex flex-col shadow-2xl">
        <div class="mb-12 text-center">
            <h1 class="orbitron text-3xl font-black tracking-widest text-white">SARBON</h1>
            <p class="text-[9px] text-cyan-400 font-bold tracking-[5px] uppercase mt-1">Universiteti</p>
        </div>
        <nav class="flex-1">
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-item active">📡 Boshqaruv</div>
            <div onclick="showPage('weekly')" id="nav-weekly" class="nav-item">🌀 Haftalik Jadval</div>
            <div onclick="showPage('add')" id="nav-add" class="nav-item">⚡ Yangi Qo'shish</div>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-10">
            <div>
                <h2 id="page-title" class="text-4xl font-black uppercase italic text-white tracking-tighter">Asosiy Oyna</h2>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-2">Tizim terminali v4.0</p>
            </div>
            <div class="time-box">
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Sana</p>
                    <p class="orbitron text-xl font-bold text-white tracking-tighter">2026-04-15</p>
                </div>
                <div class="w-[1px] h-8 bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Vaqt</p>
                    <p class="orbitron text-xl font-bold text-cyan-400 tracking-tighter">00:19</p>
                </div>
            </div>
        </header>

        <div id="dashboard" class="page active">
            <div id="teacher-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                </div>
        </div>

        <div id="weekly" class="page">
            <div class="grid grid-cols-7 gap-3">
                <div class="flex flex-col gap-3" id="col-1"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Dush</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-2"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Sesh</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-3"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Chor</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-4"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Pay</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-5"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Jum</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-6"><div class="glass-card p-3 text-center text-[10px] font-black text-cyan-500 uppercase">Sha</div><div class="container space-y-2"></div></div>
                <div class="flex flex-col gap-3" id="col-7"><div class="glass-card p-3 text-center text-[10px] font-black text-gray-500 uppercase">Yak</div><div class="container space-y-2"></div></div>
            </div>
        </div>

        <div id="add" class="page">
            <div class="max-w-2xl mx-auto glass-card p-12">
                <h4 class="text-2xl font-black uppercase italic mb-10 text-white border-l-4 border-cyan-500 pl-4">Yangi dars ma'lumoti</h4>
                <div class="space-y-6">
                    <input id="in-ifsh" type="text" placeholder="O'qituvchi F.I.Sh">
                    <input id="in-fan" type="text" placeholder="Fan nomi">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="in-sana" type="date">
                        <input id="in-image" type="file" accept="image/*" class="text-xs pt-3">
                    </div>
                    <button onclick="saveAll()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-lg shadow-cyan-500/20 mt-4">Tizimga saqlash</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('sarbon_v4_db')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id === 'dashboard' ? 'Asosiy Oyna' : (id === 'weekly' ? 'Haftalik Jadval' : 'Yangi Qo\'shish');
            if(id === 'dashboard') renderDashboard();
            if(id === 'weekly') renderWeekly();
        }

        async function saveAll() {
            const ifsh = document.getElementById('in-ifsh').value;
            const fan = document.getElementById('in-fan').value;
            const sana = document.getElementById('in-sana').value;
            const imgFile = document.getElementById('in-image').files[0];
            const vaqt = new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });

            if(!ifsh || !fan || !sana) return alert("Barcha maydonlarni to'ldiring!");

            let img = "";
            if(imgFile) {
                img = await new Promise(r => {
                    const fr = new FileReader(); fr.readAsDataURL(imgFile);
                    fr.onload = () => r(fr.result);
                });
            }

            const d = new Date(sana).getDay();
            db.push({ id: Date.now(), ifsh, fan, sana, vaqt, img, day: d === 0 ? 7 : d });
            localStorage.setItem('sarbon_v4_db', JSON.stringify(db));
            showPage('dashboard');
        }

        function renderDashboard() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = db.slice().reverse().map(t => `
                <div class="glass-card p-6 flex items-center gap-6 border-white/5 hover:border-cyan-500/40 transition-all">
                    <div class="w-24 h-24 rounded-2xl bg-white/5 border border-white/10 overflow-hidden flex-shrink-0 shadow-lg">
                        ${t.img ? `<img src="${t.img}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-[10px] text-gray-600">IMAGE</div>`}
                    </div>
                    <div class="flex-1 flex flex-col justify-center overflow-hidden">
                        <div class="flex justify-between items-start w-full">
                            <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-1 truncate">${t.ifsh}</p>
                            <button onclick="deleteItem(${t.id})" class="text-[9px] font-bold text-red-500 uppercase hover:text-red-400 transition-colors">O'chirish</button>
                        </div>
                        <h4 class="text-2xl font-black text-white italic uppercase leading-none mb-3 truncate">${t.fan}</h4>
                        <div class="flex gap-4 text-[10px] font-bold text-gray-500 border-t border-white/5 pt-2">
                            <span>${t.sana}</span>
                            <span class="text-cyan-400/70">${t.vaqt}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderWeekly() {
            document.querySelectorAll('.container').forEach(c => c.innerHTML = '');
            db.forEach(t => {
                const c = document.querySelector(`#col-${t.day} .container`);
                if(c) {
                    c.innerHTML += `
                        <div class="p-3 bg-white/5 rounded-xl border-l-2 border-cyan-500">
                            <p class="text-[9px] font-black text-white uppercase truncate">${t.fan}</p>
                            <p class="text-[8px] text-gray-500 font-bold mt-1">${t.vaqt}</p>
                        </div>
                    `;
                }
            });
        }

        function deleteItem(id) {
            if(confirm("Ma'lumot o'chirilsinми?")) {
                db = db.filter(t => t.id !== id);
                localStorage.setItem('sarbon_v4_db', JSON.stringify(db));
                renderDashboard();
            }
        }

        renderDashboard();
    </script>
</body>
</html>
